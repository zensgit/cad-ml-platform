name: PR Auto Label and Comment

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-and-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Add labels to PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const labels = ["observability", "metrics", "docs"];
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels
              });
            } catch (e) {
              core.warning(`Failed to add labels: ${e.message}`);
            }
      - name: Upsert PR context comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const { upsertBotIssueComment } = require('./scripts/ci/comment_pr_utils.js');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const marker = "<!-- auto-context:observability-metrics-phase1 -->";
            const body = `${marker}
            Thanks for the PR! Quick links and review focus:

            - README (health/metrics/PromQL): README.md
            - Alert rules: docs/ALERT_RULES.md
            - Runbooks: docs/runbooks/
            - Grafana dashboard JSON: docs/grafana/observability_dashboard.json
            - CI lint-all report artifact (non-blocking): check the latest run of 'lint-all-report' and download 'flake8-full'

            Review focus:
            - Unified error model (HTTP 200 + { success, code, error })
            - New metrics and reason labels; EMA behavior; /health payload
            - Tests coverage for rejection reasons and provider-down path
            `;
            await upsertBotIssueComment({
              github,
              owner,
              repo,
              issueNumber: issue_number,
              body,
              marker
            });

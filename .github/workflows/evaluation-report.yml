      if: steps.hybrid_blind_drift_alert.outputs.enabled == 'true'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: hybrid-blind-drift-alert-${{ github.run_number }}
        path: |
          ${{ steps.hybrid_blind_drift_alert.outputs.report_path }}
          ${{ steps.hybrid_blind_drift_alert.outputs.report_md_path }}
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload Hybrid confidence calibration artifacts
      if: steps.hybrid_calibration.outputs.enabled == 'true'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: hybrid-confidence-calibration-${{ github.run_number }}
        path: |
          ${{ steps.hybrid_calibration.outputs.output_json }}
          ${{ steps.hybrid_calibration_gate.outputs.report_path }}
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload Hybrid superpass gate artifact
      if: steps.hybrid_superpass_gate.outputs.enabled == 'true'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: hybrid-superpass-gate-${{ github.run_number }}
        path: |
          ${{ steps.hybrid_superpass_gate.outputs.report_path }}
          ${{ steps.hybrid_superpass_validate.outputs.report_path }}
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload Hybrid confidence calibration baseline artifact
      if: steps.hybrid_calibration_baseline_update.outputs.enabled == 'true'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: hybrid-confidence-calibration-baseline-${{ github.run_number }}
        path: ${{ steps.hybrid_calibration_baseline_update.outputs.baseline_json }}
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Send notifications
      if: always()
      env:
        EVAL_SLACK_WEBHOOK: ${{ secrets.EVAL_SLACK_WEBHOOK }}
        EVAL_SMTP_HOST: ${{ secrets.EVAL_SMTP_HOST }}
        EVAL_SMTP_PORT: ${{ secrets.EVAL_SMTP_PORT }}
        EVAL_EMAIL_FROM: ${{ secrets.EVAL_EMAIL_FROM }}
        EVAL_EMAIL_TO: ${{ secrets.EVAL_EMAIL_TO }}
        EVAL_EMAIL_PASSWORD: ${{ secrets.EVAL_EMAIL_PASSWORD }}
      run: |
        # Determine report URL
        if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        else
          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        fi

        # Send notifications (only on threshold breach or scheduled runs)
        if [[ "${{ github.event_name }}" == "schedule" ]]; then
          python3 scripts/notify_eval_results.py --channel all --report-url "$REPORT_URL"
        else
          python3 scripts/notify_eval_results.py --channel all --threshold-breach-only --report-url "$REPORT_URL"
        fi

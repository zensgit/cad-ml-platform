name: Evaluation Report

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      min_combined:
        description: 'Minimum combined score threshold'
        required: false
        default: '0.8'
      min_vision:
        description: 'Minimum vision score threshold'
        required: false
        default: '0.65'
      min_ocr:
        description: 'Minimum OCR score threshold'
        required: false
        default: '0.9'
      review_gate_min_total_rows:
        description: 'Override: review-pack gate min_total_rows'
        required: false
        default: ''
      review_gate_max_candidate_rate:
        description: 'Override: review-pack gate max_candidate_rate'
        required: false
        default: ''
      review_gate_max_hybrid_rejected_rate:
        description: 'Override: review-pack gate max_hybrid_rejected_rate'
        required: false
        default: ''
      review_gate_max_conflict_rate:
        description: 'Override: review-pack gate max_conflict_rate'
        required: false
        default: ''
      review_gate_max_low_confidence_rate:
        description: 'Override: review-pack gate max_low_confidence_rate'
        required: false
        default: ''
      review_gate_strict:
        description: 'Override: enable strict fail on review-pack gate failed (true/false)'
        required: false
        default: ''
      review_pack_input_csv:
        description: 'Optional review-pack input CSV path (relative to repository root)'
        required: false
        default: ''
      review_pack_input_artifact_name:
        description: 'Optional artifact name containing review-pack input CSV'
        required: false
        default: ''
      review_pack_input_artifact_run_id:
        description: 'Optional workflow run id used to download review-pack input artifact'
        required: false
        default: ''
      review_pack_input_artifact_repository:
        description: 'Optional repository for review-pack input artifact (owner/repo)'
        required: false
        default: ''
      review_pack_input_artifact_path:
        description: 'Optional path to CSV inside downloaded artifact'
        required: false
        default: ''
      benchmark_scorecard_enable:
        description: 'Override: enable benchmark scorecard generation (true/false)'
        required: false
        default: ''
      benchmark_scorecard_assistant_evidence_summary:

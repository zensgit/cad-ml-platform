      with:
        name: graph2d-train-sweep-${{ github.run_number }}
        path: ${{ steps.graph2d_train_sweep.outputs.work_root }}
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload Hybrid blind benchmark artifacts
      if: steps.hybrid_blind_eval.outputs.enabled == 'true'

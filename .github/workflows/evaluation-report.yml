    - name: Build benchmark knowledge domain release surface alignment (optional)
      id: benchmark_knowledge_domain_release_surface_alignment
      continue-on-error: true
      run: |
        ENABLE_OVERRIDE="${{ github.event.inputs.benchmark_knowledge_domain_release_surface_alignment_enable || '' }}"
        ENABLE_VALUE="${BENCHMARK_KNOWLEDGE_DOMAIN_RELEASE_SURFACE_ALIGNMENT_ENABLE:-false}"
        if [[ -n "$ENABLE_OVERRIDE" ]]; then
          ENABLE_VALUE="$ENABLE_OVERRIDE"
        fi
        ENABLE_TOKEN="$(echo "$ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"

        OUTPUT_JSON="${BENCHMARK_KNOWLEDGE_DOMAIN_RELEASE_SURFACE_ALIGNMENT_OUTPUT_JSON:-reports/history_sequence_eval/benchmark_knowledge_domain_release_surface_alignment.json}"
        OUTPUT_MD="${BENCHMARK_KNOWLEDGE_DOMAIN_RELEASE_SURFACE_ALIGNMENT_OUTPUT_MD:-reports/history_sequence_eval/benchmark_knowledge_domain_release_surface_alignment.md}"
        mkdir -p "$(dirname "$OUTPUT_JSON")"
        mkdir -p "$(dirname "$OUTPUT_MD")"

        CMD=(
          python3 scripts/export_benchmark_knowledge_domain_release_surface_alignment.py
          --title "${BENCHMARK_KNOWLEDGE_DOMAIN_RELEASE_SURFACE_ALIGNMENT_TITLE:-Benchmark Knowledge Domain Release Surface Alignment}"
          --output-json "$OUTPUT_JSON"
          --output-md "$OUTPUT_MD"
        )
        INPUT_COUNT=0

        add_if_exists() {
          local flag="$1"
          local candidate="$2"
          if [[ -n "$candidate" && -f "$candidate" ]]; then
            CMD+=("$flag" "$candidate")
            INPUT_COUNT=$((INPUT_COUNT + 1))
          fi
        }

        add_if_exists --benchmark-release-decision "${{ github.event.inputs.benchmark_knowledge_domain_release_surface_alignment_release_decision_json || '' }}"
        add_if_exists --benchmark-release-decision "${{ steps.benchmark_release_decision.outputs.output_json || '' }}"
        add_if_exists --benchmark-release-decision "${BENCHMARK_KNOWLEDGE_DOMAIN_RELEASE_SURFACE_ALIGNMENT_RELEASE_DECISION_JSON:-}"
        add_if_exists --benchmark-release-runbook "${{ github.event.inputs.benchmark_knowledge_domain_release_surface_alignment_release_runbook_json || '' }}"
        add_if_exists --benchmark-release-runbook "${{ steps.benchmark_release_runbook.outputs.output_json || '' }}"
        add_if_exists --benchmark-release-runbook "${BENCHMARK_KNOWLEDGE_DOMAIN_RELEASE_SURFACE_ALIGNMENT_RELEASE_RUNBOOK_JSON:-}"

        if [[ "$ENABLE_TOKEN" != "1" && "$ENABLE_TOKEN" != "true" && "$ENABLE_TOKEN" != "yes" && "$ENABLE_TOKEN" != "on" ]]; then
          if [[ "$INPUT_COUNT" -eq 0 ]]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "BENCHMARK_KNOWLEDGE_DOMAIN_RELEASE_SURFACE_ALIGNMENT_ENABLE is not true and no inputs found; skip."
            exit 0
          fi
        fi

        if [[ "$INPUT_COUNT" -eq 0 ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "No benchmark knowledge domain release surface alignment inputs found; skip."
          exit 0
        fi

        "${CMD[@]}"

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "output_json=$OUTPUT_JSON" >> $GITHUB_OUTPUT
        echo "output_md=$OUTPUT_MD" >> $GITHUB_OUTPUT
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(
            Path(
                os.environ[
                    "BENCHMARK_KNOWLEDGE_DOMAIN_RELEASE_SURFACE_ALIGNMENT_OUTPUT_JSON"
                ]
            ).read_text(encoding="utf-8")
        )
        component = payload.get("knowledge_domain_release_surface_alignment") or {}
        recommendations = payload.get("recommendations") or []

        def compact(items):
            return "; ".join(str(item).strip() for item in items[:4] if str(item).strip())

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
          f.write(f"status={component.get('status', 'unknown')}\n")
          f.write(f"summary={component.get('summary', 'none')}\n")
          f.write(f"mismatch_count={component.get('mismatch_count', 0)}\n")
          f.write(f"mismatches={compact(component.get('mismatches') or [])}\n")
          f.write(
              "domain_mismatches="
              f"{compact(component.get('domain_mismatches') or [])}\n"
          )
          f.write(
              "release_blocker_mismatches="
              f"{compact(component.get('release_blocker_mismatches') or [])}\n"
          )
          f.write(f"recommendations={compact(recommendations)}\n")
        PY

    - name: Build benchmark operator adoption (optional)
      id: benchmark_operator_adoption
      continue-on-error: true
      run: |
        ENABLE_OVERRIDE="${{ github.event.inputs.benchmark_operator_adoption_enable || '' }}"
        ENABLE_VALUE="${BENCHMARK_OPERATOR_ADOPTION_ENABLE:-false}"
        if [[ -n "$ENABLE_OVERRIDE" ]]; then

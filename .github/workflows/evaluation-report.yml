      run: |
        python3 scripts/ci/summarize_hybrid_confidence_calibration_gate.py \
          --report-json "${{ steps.hybrid_calibration_gate.outputs.report_path }}" \
          --title "Hybrid Confidence Calibration Gate (Evaluation Report Workflow)" \
          >> "$GITHUB_STEP_SUMMARY"

    - name: Evaluate Hybrid calibration gate strict mode (optional)
      id: hybrid_calibration_gate_strict
      if: steps.hybrid_calibration_gate.outputs.enabled == 'true'
      continue-on-error: true
      run: |
        STRICT_OVERRIDE="${{ github.event.inputs.hybrid_calibration_fail_on_gate_failed || '' }}"
        STRICT_VALUE="${HYBRID_CONFIDENCE_CALIBRATION_FAIL_ON_GATE_FAILED:-false}"
        if [[ -n "$STRICT_OVERRIDE" ]]; then
          STRICT_VALUE="$STRICT_OVERRIDE"
        fi
        token="$(echo "$STRICT_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_strict="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_strict="true"
        fi
        gate_status="${{ steps.hybrid_calibration_gate.outputs.status }}"
        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "strict_mode=$is_strict" >> $GITHUB_OUTPUT
        echo "gate_status=$gate_status" >> $GITHUB_OUTPUT
        if [[ "$is_strict" != "true" ]]; then
          echo "should_fail=false" >> $GITHUB_OUTPUT
          echo "reason=strict_mode_disabled" >> $GITHUB_OUTPUT
          echo "Hybrid calibration strict mode disabled."
          exit 0
        fi
        if [[ "$gate_status" != "passed" ]]; then
          echo "should_fail=true" >> $GITHUB_OUTPUT
          echo "reason=gate_failed_under_strict_mode" >> $GITHUB_OUTPUT
          echo "Hybrid calibration strict mode enabled and gate status is not passed."
          exit 0
        fi
        echo "should_fail=false" >> $GITHUB_OUTPUT
        echo "reason=gate_passed_under_strict_mode" >> $GITHUB_OUTPUT
        echo "Hybrid calibration strict mode enabled and gate passed."

    - name: Update Hybrid calibration baseline (optional)
      id: hybrid_calibration_baseline_update
      if: steps.hybrid_calibration_gate.outputs.enabled == 'true'
      continue-on-error: true
      run: |
        UPDATE_OVERRIDE="${{ github.event.inputs.hybrid_calibration_update_baseline || '' }}"
        UPDATE_VALUE="${HYBRID_CONFIDENCE_CALIBRATION_BASELINE_UPDATE_ENABLE:-false}"
        if [[ -n "$UPDATE_OVERRIDE" ]]; then
          UPDATE_VALUE="$UPDATE_OVERRIDE"
        fi
        token="$(echo "$UPDATE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        should_update="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          should_update="true"
        fi
        if [[ "$should_update" != "true" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Hybrid calibration baseline update disabled."
          exit 0
        fi

        if [[ "${{ steps.hybrid_calibration_gate.outputs.status }}" != "passed" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Hybrid calibration gate not passed; skip baseline update."
          exit 0
        fi

        CURRENT_JSON="${{ steps.hybrid_calibration.outputs.output_json }}"
        if [[ -z "$CURRENT_JSON" || ! -f "$CURRENT_JSON" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Hybrid calibration output missing: $CURRENT_JSON"
          exit 0
        fi

        BASELINE_JSON="${HYBRID_CONFIDENCE_CALIBRATION_BASELINE_OUTPUT_JSON:-config/hybrid_confidence_calibration_baseline.json}"
        SNAPSHOT_JSON="${HYBRID_CONFIDENCE_CALIBRATION_BASELINE_SNAPSHOT_JSON:-}"
        CMD=(
          python3 scripts/ci/update_hybrid_confidence_calibration_baseline.py
          --current-json "$CURRENT_JSON"
          --output-baseline-json "$BASELINE_JSON"
        )
        if [[ -n "$SNAPSHOT_JSON" ]]; then
          CMD+=(--snapshot-output-json "$SNAPSHOT_JSON")
        fi

        set +e
        "${CMD[@]}"
        BASELINE_EXIT_CODE=$?
        set -e

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "exit_code=$BASELINE_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "baseline_json=$BASELINE_JSON" >> $GITHUB_OUTPUT
        if [[ -f "$BASELINE_JSON" ]]; then
          echo "status=updated" >> $GITHUB_OUTPUT
        else
          echo "status=missing_output" >> $GITHUB_OUTPUT
        fi

    - name: Check Hybrid superpass gate (optional)
      id: hybrid_superpass_gate
      if: always()
      continue-on-error: true
      run: |
        ENABLE_OVERRIDE="${{ github.event.inputs.hybrid_superpass_enable || '' }}"
        ENABLE_VALUE="${HYBRID_SUPERPASS_ENABLE:-false}"
        if [[ -n "$ENABLE_OVERRIDE" ]]; then
          ENABLE_VALUE="$ENABLE_OVERRIDE"
        fi
        token="$(echo "$ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_enabled="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_enabled="true"
        fi
        if [[ "$is_enabled" != "true" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Hybrid superpass gate disabled."
          exit 0
        fi

        REPORT_PATH="${HYBRID_SUPERPASS_OUTPUT_JSON:-reports/history_sequence_eval/hybrid_superpass_report.json}"
        mkdir -p "$(dirname "$REPORT_PATH")"

        GATE_JSON="${{ steps.hybrid_blind_gate.outputs.report_path }}"
        if [[ -z "$GATE_JSON" ]]; then
          GATE_JSON="${HYBRID_SUPERPASS_GATE_REPORT_JSON:-reports/history_sequence_eval/hybrid_blind_gate_report.json}"
        fi
        CALIBRATION_JSON="${{ steps.hybrid_calibration.outputs.output_json }}"
        if [[ -z "$CALIBRATION_JSON" ]]; then
          CALIBRATION_JSON="${HYBRID_SUPERPASS_CALIBRATION_JSON:-models/calibration/hybrid_confidence_calibration.json}"
        fi

        MISSING_OVERRIDE="${{ github.event.inputs.hybrid_superpass_missing_mode || '' }}"
        MISSING_MODE="${HYBRID_SUPERPASS_MISSING_MODE:-skip}"
        if [[ -n "$MISSING_OVERRIDE" ]]; then
          MISSING_MODE="$MISSING_OVERRIDE"
        fi

        set +e
        python3 scripts/ci/check_hybrid_superpass_targets.py \
          --hybrid-blind-gate-report "$GATE_JSON" \
          --hybrid-calibration-json "$CALIBRATION_JSON" \
          --config "${HYBRID_SUPERPASS_CONFIG:-config/hybrid_superpass_targets.yaml}" \
          --missing-mode "$MISSING_MODE" \
          --output "$REPORT_PATH"
        SUPERPASS_EXIT_CODE=$?
        set -e

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT
        echo "missing_mode=$MISSING_MODE" >> $GITHUB_OUTPUT
        echo "exit_code=$SUPERPASS_EXIT_CODE" >> $GITHUB_OUTPUT
        if [[ ! -f "$REPORT_PATH" ]]; then
          echo "status=missing_output" >> $GITHUB_OUTPUT
          exit 0
        fi

        export HYBRID_SUPERPASS_REPORT="$REPORT_PATH"
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path(os.environ["HYBRID_SUPERPASS_REPORT"]).read_text(encoding="utf-8"))
        failures = payload.get("failures") if isinstance(payload.get("failures"), list) else []
        warnings = payload.get("warnings") if isinstance(payload.get("warnings"), list) else []
        first_failure = str(failures[0]).replace("\n", " ").replace("\r", " ").strip() if failures else ""
        first_warning = str(warnings[0]).replace("\n", " ").replace("\r", " ").strip() if warnings else ""
        headline = "passed"
        if payload.get("status") != "passed":
            headline = f"failed: {first_failure or 'unknown reason'}"
        elif first_warning:
            headline = f"passed_with_warning: {first_warning}"
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"status={payload.get('status', 'unknown')}\n")
            f.write(f"failure_count={len(failures)}\n")
            f.write(f"warning_count={len(warnings)}\n")
            f.write(f"headline={headline}\n")
        PY

    - name: Evaluate Hybrid superpass strict mode (optional)
      id: hybrid_superpass_gate_strict
      if: steps.hybrid_superpass_gate.outputs.enabled == 'true'
      continue-on-error: true
      run: |
        STRICT_OVERRIDE="${{ github.event.inputs.hybrid_superpass_fail_on_failed || '' }}"
        STRICT_VALUE="${HYBRID_SUPERPASS_FAIL_ON_FAILED:-false}"
        if [[ -n "$STRICT_OVERRIDE" ]]; then
          STRICT_VALUE="$STRICT_OVERRIDE"
        fi
        token="$(echo "$STRICT_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_strict="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_strict="true"
        fi
        gate_status="${{ steps.hybrid_superpass_gate.outputs.status }}"
        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "strict_mode=$is_strict" >> $GITHUB_OUTPUT
        echo "gate_status=$gate_status" >> $GITHUB_OUTPUT
        if [[ "$is_strict" != "true" ]]; then
          echo "should_fail=false" >> $GITHUB_OUTPUT
          echo "reason=strict_mode_disabled" >> $GITHUB_OUTPUT
          echo "Hybrid superpass strict mode disabled."
          exit 0
        fi
        if [[ "$gate_status" != "passed" ]]; then
          echo "should_fail=true" >> $GITHUB_OUTPUT
          echo "reason=superpass_failed_under_strict_mode" >> $GITHUB_OUTPUT
          echo "Hybrid superpass strict mode enabled and status is not passed."
          exit 0
        fi
        echo "should_fail=false" >> $GITHUB_OUTPUT
        echo "reason=superpass_passed_under_strict_mode" >> $GITHUB_OUTPUT
        echo "Hybrid superpass strict mode enabled and status passed."

    - name: Validate Hybrid superpass report structure (optional)
      id: hybrid_superpass_validate
      if: steps.hybrid_superpass_gate.outputs.enabled == 'true'
      continue-on-error: true
      run: |
        REPORT_PATH="${{ steps.hybrid_superpass_gate.outputs.report_path }}"
        if [[ -z "$REPORT_PATH" || ! -f "$REPORT_PATH" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "status=skipped_missing_superpass_report" >> $GITHUB_OUTPUT
          echo "warning_count=1" >> $GITHUB_OUTPUT
          echo "error_count=0" >> $GITHUB_OUTPUT
          echo "report_path=" >> $GITHUB_OUTPUT
          echo "Hybrid superpass report missing; skip structural validation."
          exit 0
        fi

        VALIDATION_JSON="${HYBRID_SUPERPASS_VALIDATION_JSON:-reports/history_sequence_eval/hybrid_superpass_validation.json}"
        mkdir -p "$(dirname "$VALIDATION_JSON")"

        GATE_JSON="${{ steps.hybrid_blind_gate.outputs.report_path }}"
        if [[ -z "$GATE_JSON" ]]; then
          GATE_JSON="${HYBRID_SUPERPASS_GATE_REPORT_JSON:-reports/history_sequence_eval/hybrid_blind_gate_report.json}"
        fi
        CALIBRATION_JSON="${{ steps.hybrid_calibration.outputs.output_json }}"
        if [[ -z "$CALIBRATION_JSON" ]]; then
          CALIBRATION_JSON="${HYBRID_SUPERPASS_CALIBRATION_JSON:-models/calibration/hybrid_confidence_calibration.json}"
        fi

        STRICT_MODE="${{ steps.hybrid_superpass_gate_strict.outputs.strict_mode || 'false' }}"
        VALIDATION_STRICT_VALUE="${HYBRID_SUPERPASS_VALIDATION_STRICT:-$STRICT_MODE}"
        token="$(echo "$VALIDATION_STRICT_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        validation_strict="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          validation_strict="true"
        fi
        validation_schema_mode="${HYBRID_SUPERPASS_VALIDATION_SCHEMA_MODE:-builtin}"
        schema_token="$(echo "$validation_schema_mode" | tr '[:upper:]' '[:lower:]' | xargs)"
        if [[ "$schema_token" != "off" && "$schema_token" != "builtin" ]]; then
          schema_token="builtin"
        fi
        args=(
          python3 scripts/ci/validate_hybrid_superpass_reports.py
          --superpass-json "$REPORT_PATH"
          --output-json "$VALIDATION_JSON"
          --schema-mode "$schema_token"
        )
        if [[ -n "$GATE_JSON" ]]; then
          args+=(--hybrid-blind-gate-report "$GATE_JSON")
        fi
        if [[ -n "$CALIBRATION_JSON" ]]; then
          args+=(--hybrid-calibration-json "$CALIBRATION_JSON")
        fi
        if [[ "$validation_strict" == "true" ]]; then
          args+=(--strict)
        fi

        set +e
        "${args[@]}"
        VALIDATE_EXIT_CODE=$?
        set -e

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "exit_code=$VALIDATE_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "report_path=$VALIDATION_JSON" >> $GITHUB_OUTPUT
        echo "strict_mode=$validation_strict" >> $GITHUB_OUTPUT
        echo "schema_mode=$schema_token" >> $GITHUB_OUTPUT
        if [[ ! -f "$VALIDATION_JSON" ]]; then
          echo "status=missing_output" >> $GITHUB_OUTPUT
          echo "warning_count=0" >> $GITHUB_OUTPUT
          echo "error_count=1" >> $GITHUB_OUTPUT
          exit 0
        fi

        export HYBRID_SUPERPASS_VALIDATION_REPORT="$VALIDATION_JSON"
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(
            Path(os.environ["HYBRID_SUPERPASS_VALIDATION_REPORT"]).read_text(encoding="utf-8")
        )
        status = str(payload.get("status", "unknown"))
        warnings = payload.get("warnings") if isinstance(payload.get("warnings"), list) else []
        errors = payload.get("errors") if isinstance(payload.get("errors"), list) else []
        if status == "error":
            headline = f"error: {str(errors[0]).strip() if errors else 'unknown'}"
        elif status == "warn":
            headline = f"warn: {str(warnings[0]).strip() if warnings else 'warning'}"
        else:
            headline = "ok"
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"status={status}\n")
            f.write(f"warning_count={len(warnings)}\n")
            f.write(f"error_count={len(errors)}\n")
            f.write(f"headline={headline}\n")
        PY

    - name: Fail workflow when Hybrid superpass strict check requires blocking
      if: steps.hybrid_superpass_gate_strict.outputs.should_fail == 'true'
      run: |
        echo "Hybrid superpass strict-mode check requested failure."
        echo "Failure reason: ${{ steps.hybrid_superpass_gate_strict.outputs.reason }}"
        exit 1

    - name: Fail workflow when Hybrid superpass structure validation requires blocking
      if: steps.hybrid_superpass_validate.outputs.strict_mode == 'true' && steps.hybrid_superpass_validate.outputs.exit_code != '0'
      run: |
        echo "Hybrid superpass structure validation failed in strict mode."
        echo "Validation status: ${{ steps.hybrid_superpass_validate.outputs.status }}"
        echo "Validation headline: ${{ steps.hybrid_superpass_validate.outputs.headline || 'n/a' }}"
        exit 1

    - name: Generate trend charts
      run: |
        python3 scripts/eval_trend.py --out reports/eval_history/plots
      continue-on-error: true  # Don't fail if charts can't be generated

    - name: Generate HTML report
      run: |
        python3 scripts/generate_eval_report.py \
          --out ${{ env.REPORT_PATH }}

    - name: Download Chart.js for integrity check
      run: |
        # Download Chart.js from CDN to local path for integrity verification
        mkdir -p reports/eval_history/report/assets
        curl -sL "https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" \
          -o reports/eval_history/report/assets/chart.min.js

    - name: Check file integrity (strict mode)
      run: |
        echo "Checking Chart.js integrity..."
        # Run in strict mode since we're in CI environment
        python3 scripts/check_integrity.py --strict --verbose
        echo "✅ Integrity check passed"

    - name: Validate history with JSON Schema
      run: |
        echo "Validating evaluation history against schema..."
        # With jsonschema installed, this will perform full validation
        python3 scripts/validate_eval_history.py \
          --dir reports/eval_history \
          --summary \
          --exclude-glob hybrid_blind_drift_alert_report.json \
          --exclude-glob hybrid_blind_drift_threshold_suggestion.json
        echo "✅ Schema validation passed"

    - name: Generate insights and detect anomalies
      id: insights
      run: |
        echo "Analyzing evaluation trends and anomalies..."
        python3 scripts/analyze_eval_insights.py --days 30 --output reports/insights.md

        # Check for anomalies
        if python3 scripts/analyze_eval_insights.py --days 7 --threshold 0.1 --narrative-only | grep -q "Anomalies Detected"; then
          echo "has_anomalies=true" >> $GITHUB_OUTPUT
          echo "⚠️ Anomalies detected in recent evaluations"
        else
          echo "has_anomalies=false" >> $GITHUB_OUTPUT
          echo "✅ No anomalies detected"
        fi

    - name: Generate weekly rolling summary
      id: weekly_summary
      run: |
        OUTPUT_MD="reports/eval_history/weekly_summary.md"
        python3 scripts/ci/generate_eval_weekly_summary.py \
          --eval-history-dir reports/eval_history \
          --output-md "$OUTPUT_MD" \
          --days 7 \
          --graph2d-blind-status "${{ steps.graph2d_blind_gate.outputs.status || 'unknown' }}" \
          --graph2d-blind-accuracy "${{ steps.graph2d_blind_gate.outputs.accuracy || 'n/a' }}" \
          --hybrid-blind-status "${{ steps.hybrid_blind_gate.outputs.status || 'unknown' }}" \
          --hybrid-blind-accuracy "${{ steps.hybrid_blind_gate.outputs.hybrid_accuracy || 'n/a' }}" \
          --hybrid-blind-gain "${{ steps.hybrid_blind_gate.outputs.hybrid_gain_vs_graph2d || 'n/a' }}" \
          --hybrid-calibration-status "${{ steps.hybrid_calibration.outputs.status || 'unknown' }}" \
          --hybrid-calibration-gate-status "${{ steps.hybrid_calibration_gate.outputs.status || 'unknown' }}"
        echo "output_md=$OUTPUT_MD" >> $GITHUB_OUTPUT

    - name: Export metrics for monitoring
      run: |
        echo "Exporting metrics in multiple formats..."
        python3 scripts/export_eval_metrics.py --format prometheus --output reports/metrics.prom
        python3 scripts/export_eval_metrics.py --format json --output reports/metrics.json
        echo "✅ Metrics exported"

    - name: Security audit
      id: security
      continue-on-error: true
      run: |
        echo "Running security audit..."
        if python3 scripts/security_audit.py --severity medium --json > reports/security_audit.json 2>&1; then
          echo "security_status=pass" >> $GITHUB_OUTPUT
          echo "✅ Security audit passed"
        else
          echo "security_status=fail" >> $GITHUB_OUTPUT
          echo "⚠️ Security issues found (non-blocking)"
        fi

    - name: Upload evaluation report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: evaluation-report-${{ github.run_number }}
        path: ${{ env.REPORT_PATH }}
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload evaluation history
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: evaluation-history-${{ github.run_number }}
        path: reports/eval_history/*.json
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload weekly summary
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: evaluation-weekly-summary-${{ github.run_number }}
        path: ${{ steps.weekly_summary.outputs.output_md }}
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload history-sequence evaluation
      if: steps.history_eval.outputs.enabled == 'true'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: history-sequence-eval-${{ github.run_number }}

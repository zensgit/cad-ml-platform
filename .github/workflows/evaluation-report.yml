name: Evaluation Report

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      min_combined:
        description: 'Minimum combined score threshold'
        required: false
        default: '0.8'
      min_vision:
        description: 'Minimum vision score threshold'
        required: false
        default: '0.65'
      min_ocr:
        description: 'Minimum OCR score threshold'
        required: false
        default: '0.9'
      review_gate_min_total_rows:
        description: 'Override: review-pack gate min_total_rows'
        required: false
        default: ''
      review_gate_max_candidate_rate:
        description: 'Override: review-pack gate max_candidate_rate'
        required: false
        default: ''
      review_gate_max_hybrid_rejected_rate:
        description: 'Override: review-pack gate max_hybrid_rejected_rate'
        required: false
        default: ''
      review_gate_max_conflict_rate:
        description: 'Override: review-pack gate max_conflict_rate'
        required: false
        default: ''
      review_gate_max_low_confidence_rate:
        description: 'Override: review-pack gate max_low_confidence_rate'
        required: false
        default: ''
      review_gate_strict:
        description: 'Override: enable strict fail on review-pack gate failed (true/false)'
        required: false
        default: ''
      review_pack_input_csv:
        description: 'Optional review-pack input CSV path (relative to repository root)'
        required: false
        default: ''
      hybrid_calibration_enable:
        description: 'Override: enable hybrid confidence calibration flow (true/false)'
        required: false
        default: ''
      hybrid_calibration_input_csv:
        description: 'Override: hybrid calibration input CSV path (relative to repository root)'
        required: false
        default: ''
      hybrid_calibration_missing_mode:
        description: 'Override: hybrid calibration gate missing-mode (skip/fail)'
        required: false
        default: ''
      hybrid_calibration_fail_on_gate_failed:
        description: 'Override: strict fail when hybrid calibration gate status is not passed (true/false)'
        required: false
        default: ''
      hybrid_calibration_update_baseline:
        description: 'Override: update hybrid calibration baseline when gate passed (true/false)'
        required: false
        default: ''
      hybrid_blind_enable:
        description: 'Override: enable hybrid blind benchmark+gate flow (true/false)'
        required: false
        default: ''
      hybrid_blind_dxf_dir:
        description: 'Override: hybrid blind DXF directory path (relative to repository root)'
        required: false
        default: ''
      hybrid_blind_manifest_csv:
        description: 'Override: hybrid blind manifest CSV path (relative to repository root)'
        required: false
        default: ''
      hybrid_blind_synth_manifest:
        description: 'Override: synthetic manifest JSON path used when hybrid blind DXF dir is missing'
        required: false
        default: ''
      hybrid_blind_fail_on_gate_failed:
        description: 'Override: strict fail when hybrid blind gate status is not passed (true/false)'
        required: false
        default: ''
      hybrid_blind_strict_require_real_data:
        description: 'Override: strict mode requires configured real DXF dataset source (true/false)'
        required: false
        default: ''
      hybrid_blind_drift_alert_enable:
        description: 'Override: enable hybrid blind drift alert check (true/false)'
        required: false
        default: ''
      hybrid_superpass_enable:
        description: 'Override: enable hybrid superpass target gate (true/false)'
        required: false
        default: ''
      hybrid_superpass_missing_mode:
        description: 'Override: hybrid superpass missing-mode (skip/fail)'
        required: false
        default: ''
      hybrid_superpass_fail_on_failed:
        description: 'Override: strict fail when hybrid superpass status is not passed (true/false)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'
  REPORT_PATH: reports/eval_history/report
  ARTIFACT_RETENTION_DAYS: 30
  CI_WATCH_SUMMARY_JSON_FOR_COMMENT: ${{ vars.CI_WATCH_SUMMARY_JSON_FOR_COMMENT || '' }}
  # Optimize Matplotlib in CI
  MPLCONFIGDIR: /tmp/matplotlib
  XDG_CACHE_HOME: /tmp/cache
  HISTORY_SEQUENCE_EVAL_MANIFEST: ${{ vars.HISTORY_SEQUENCE_EVAL_MANIFEST }}
  HISTORY_SEQUENCE_EVAL_H5_DIR: ${{ vars.HISTORY_SEQUENCE_EVAL_H5_DIR }}
  HISTORY_SEQUENCE_FILENAME_MIN_CONF: ${{ vars.HISTORY_SEQUENCE_FILENAME_MIN_CONF || '0.8' }}
  HISTORY_SEQUENCE_PROTOTYPE_TOKEN_WEIGHT: ${{ vars.HISTORY_SEQUENCE_PROTOTYPE_TOKEN_WEIGHT || '1.0' }}
  HISTORY_SEQUENCE_PROTOTYPE_BIGRAM_WEIGHT: ${{ vars.HISTORY_SEQUENCE_PROTOTYPE_BIGRAM_WEIGHT || '1.0' }}
  HISTORY_SEQUENCE_TUNE_ENABLE: ${{ vars.HISTORY_SEQUENCE_TUNE_ENABLE || 'false' }}
  HISTORY_SEQUENCE_TUNE_OBJECTIVE: ${{ vars.HISTORY_SEQUENCE_TUNE_OBJECTIVE || 'macro_f1_overall' }}
  HISTORY_SEQUENCE_TUNE_TOKEN_WEIGHT_GRID: ${{ vars.HISTORY_SEQUENCE_TUNE_TOKEN_WEIGHT_GRID || '0.5,1.0,1.5' }}
  HISTORY_SEQUENCE_TUNE_BIGRAM_WEIGHT_GRID: ${{ vars.HISTORY_SEQUENCE_TUNE_BIGRAM_WEIGHT_GRID || '0.0,0.5,1.0,1.5' }}
  GRAPH2D_BLIND_SUMMARY_JSON: ${{ vars.GRAPH2D_BLIND_SUMMARY_JSON }}
  GRAPH2D_BLIND_GATE_CONFIG: ${{ vars.GRAPH2D_BLIND_GATE_CONFIG || 'config/graph2d_blind_gate.yaml' }}
  GRAPH2D_REVIEW_PACK_INPUT_CSV: ${{ vars.GRAPH2D_REVIEW_PACK_INPUT_CSV }}
  GRAPH2D_REVIEW_PACK_OUTPUT_CSV: ${{ vars.GRAPH2D_REVIEW_PACK_OUTPUT_CSV || 'reports/history_sequence_eval/hybrid_review_pack.csv' }}
  GRAPH2D_REVIEW_PACK_SUMMARY_JSON: ${{ vars.GRAPH2D_REVIEW_PACK_SUMMARY_JSON || 'reports/history_sequence_eval/hybrid_review_pack_summary.json' }}
  GRAPH2D_REVIEW_PACK_LOW_CONF_THRESHOLD: ${{ vars.GRAPH2D_REVIEW_PACK_LOW_CONF_THRESHOLD || '0.6' }}
  GRAPH2D_REVIEW_PACK_TOP_K: ${{ vars.GRAPH2D_REVIEW_PACK_TOP_K || '200' }}
  GRAPH2D_REVIEW_PACK_GATE_CONFIG: ${{ vars.GRAPH2D_REVIEW_PACK_GATE_CONFIG || 'config/graph2d_review_pack_gate.yaml' }}
  GRAPH2D_REVIEW_PACK_GATE_REPORT: ${{ vars.GRAPH2D_REVIEW_PACK_GATE_REPORT || 'reports/history_sequence_eval/graph2d_review_pack_gate_report.json' }}
  GRAPH2D_REVIEW_PACK_GATE_STRICT: ${{ vars.GRAPH2D_REVIEW_PACK_GATE_STRICT || 'false' }}
  GRAPH2D_TRAIN_SWEEP_ENABLE: ${{ vars.GRAPH2D_TRAIN_SWEEP_ENABLE || 'false' }}
  GRAPH2D_TRAIN_SWEEP_EXECUTE: ${{ vars.GRAPH2D_TRAIN_SWEEP_EXECUTE || 'false' }}
  GRAPH2D_TRAIN_SWEEP_FAIL_ON_ERROR: ${{ vars.GRAPH2D_TRAIN_SWEEP_FAIL_ON_ERROR || 'false' }}
  GRAPH2D_TRAIN_SWEEP_RECIPES: ${{ vars.GRAPH2D_TRAIN_SWEEP_RECIPES || 'baseline,focal_balanced' }}
  GRAPH2D_TRAIN_SWEEP_SEEDS: ${{ vars.GRAPH2D_TRAIN_SWEEP_SEEDS || '7,21,42' }}
  GRAPH2D_TRAIN_SWEEP_MAX_RUNS: ${{ vars.GRAPH2D_TRAIN_SWEEP_MAX_RUNS || '0' }}
  GRAPH2D_TRAIN_SWEEP_BASE_ARGS_JSON: ${{ vars.GRAPH2D_TRAIN_SWEEP_BASE_ARGS_JSON || '[]' }}
  GRAPH2D_TRAIN_SWEEP_WORK_ROOT: ${{ vars.GRAPH2D_TRAIN_SWEEP_WORK_ROOT || 'reports/history_sequence_eval/graph2d_train_recipe_sweep' }}
  HYBRID_CONFIDENCE_CALIBRATION_ENABLE: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_ENABLE || 'false' }}
  HYBRID_CONFIDENCE_CALIBRATION_INPUT_CSV: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_INPUT_CSV }}
  HYBRID_CONFIDENCE_CALIBRATION_OUTPUT_JSON: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_OUTPUT_JSON || 'reports/calibration/hybrid_confidence_calibration_latest.json' }}
  HYBRID_CONFIDENCE_CALIBRATION_METHOD: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_METHOD || 'temperature_scaling' }}
  HYBRID_CONFIDENCE_CALIBRATION_PER_SOURCE: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_PER_SOURCE || 'true' }}
  HYBRID_CONFIDENCE_CALIBRATION_CONFIDENCE_COL: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_CONFIDENCE_COL || 'confidence' }}
  HYBRID_CONFIDENCE_CALIBRATION_CORRECT_COL: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_CORRECT_COL || 'is_correct' }}
  HYBRID_CONFIDENCE_CALIBRATION_PRED_LABEL_COL: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_PRED_LABEL_COL || 'predicted_label' }}
  HYBRID_CONFIDENCE_CALIBRATION_TRUTH_LABEL_COL: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_TRUTH_LABEL_COL || 'correct_label' }}
  HYBRID_CONFIDENCE_CALIBRATION_SOURCE_COL: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_SOURCE_COL || 'source' }}
  HYBRID_CONFIDENCE_CALIBRATION_MIN_SAMPLES: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_MIN_SAMPLES || '30' }}
  HYBRID_CONFIDENCE_CALIBRATION_MIN_SAMPLES_PER_SOURCE: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_MIN_SAMPLES_PER_SOURCE || '10' }}
  HYBRID_CONFIDENCE_CALIBRATION_MAX_ROWS: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_MAX_ROWS || '0' }}
  HYBRID_CONFIDENCE_CALIBRATION_INCLUDE_FIT_DATA: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_INCLUDE_FIT_DATA || 'false' }}
  HYBRID_CONFIDENCE_CALIBRATION_FAIL_ON_INSUFFICIENT: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_FAIL_ON_INSUFFICIENT || 'false' }}
  HYBRID_CONFIDENCE_CALIBRATION_GATE_CONFIG: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_GATE_CONFIG || 'config/hybrid_confidence_calibration_gate.yaml' }}
  HYBRID_CONFIDENCE_CALIBRATION_GATE_BASELINE_JSON: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_GATE_BASELINE_JSON || 'config/hybrid_confidence_calibration_baseline.json' }}
  HYBRID_CONFIDENCE_CALIBRATION_GATE_MISSING_MODE: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_GATE_MISSING_MODE || 'skip' }}
  HYBRID_CONFIDENCE_CALIBRATION_FAIL_ON_GATE_FAILED: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_FAIL_ON_GATE_FAILED || 'false' }}
  HYBRID_CONFIDENCE_CALIBRATION_BASELINE_UPDATE_ENABLE: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_BASELINE_UPDATE_ENABLE || 'false' }}
  HYBRID_CONFIDENCE_CALIBRATION_BASELINE_OUTPUT_JSON: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_BASELINE_OUTPUT_JSON || 'config/hybrid_confidence_calibration_baseline.json' }}
  HYBRID_CONFIDENCE_CALIBRATION_BASELINE_SNAPSHOT_JSON: ${{ vars.HYBRID_CONFIDENCE_CALIBRATION_BASELINE_SNAPSHOT_JSON || '' }}
  HYBRID_SUPERPASS_ENABLE: ${{ vars.HYBRID_SUPERPASS_ENABLE || 'false' }}
  HYBRID_SUPERPASS_CONFIG: ${{ vars.HYBRID_SUPERPASS_CONFIG || 'config/hybrid_superpass_targets.yaml' }}
  HYBRID_SUPERPASS_OUTPUT_JSON: ${{ vars.HYBRID_SUPERPASS_OUTPUT_JSON || 'reports/history_sequence_eval/hybrid_superpass_report.json' }}
  HYBRID_SUPERPASS_MISSING_MODE: ${{ vars.HYBRID_SUPERPASS_MISSING_MODE || 'skip' }}
  HYBRID_SUPERPASS_GATE_REPORT_JSON: ${{ vars.HYBRID_SUPERPASS_GATE_REPORT_JSON || 'reports/history_sequence_eval/hybrid_blind_gate_report.json' }}
  HYBRID_SUPERPASS_CALIBRATION_JSON: ${{ vars.HYBRID_SUPERPASS_CALIBRATION_JSON || 'models/calibration/hybrid_confidence_calibration.json' }}
  HYBRID_SUPERPASS_VALIDATION_JSON: ${{ vars.HYBRID_SUPERPASS_VALIDATION_JSON || 'reports/history_sequence_eval/hybrid_superpass_validation.json' }}
  HYBRID_SUPERPASS_FAIL_ON_FAILED: ${{ vars.HYBRID_SUPERPASS_FAIL_ON_FAILED || 'false' }}
  HYBRID_SUPERPASS_VALIDATION_STRICT: ${{ vars.HYBRID_SUPERPASS_VALIDATION_STRICT || 'false' }}
  HYBRID_SUPERPASS_VALIDATION_SCHEMA_MODE: ${{ vars.HYBRID_SUPERPASS_VALIDATION_SCHEMA_MODE || 'builtin' }}
  HYBRID_BLIND_ENABLE: ${{ vars.HYBRID_BLIND_ENABLE || 'false' }}
  HYBRID_BLIND_DXF_DIR: ${{ vars.HYBRID_BLIND_DXF_DIR }}
  HYBRID_BLIND_MANIFEST_CSV: ${{ vars.HYBRID_BLIND_MANIFEST_CSV || '' }}
  HYBRID_BLIND_SYNTH_MANIFEST: ${{ vars.HYBRID_BLIND_SYNTH_MANIFEST || 'tests/golden/golden_dxf_hybrid_cases.json' }}
  HYBRID_BLIND_SYNTH_OUTPUT_DIR: ${{ vars.HYBRID_BLIND_SYNTH_OUTPUT_DIR || 'reports/history_sequence_eval/hybrid_blind_synth' }}
  HYBRID_BLIND_MAX_FILES: ${{ vars.HYBRID_BLIND_MAX_FILES || '200' }}
  HYBRID_BLIND_SEED: ${{ vars.HYBRID_BLIND_SEED || '22' }}
  HYBRID_BLIND_OUTPUT_DIR: ${{ vars.HYBRID_BLIND_OUTPUT_DIR || 'reports/history_sequence_eval/hybrid_blind' }}
  HYBRID_BLIND_LABEL_SLICE_MAX_SNAPSHOTS: ${{ vars.HYBRID_BLIND_LABEL_SLICE_MAX_SNAPSHOTS || '20' }}
  HYBRID_BLIND_FAMILY_PREFIX_LEN: ${{ vars.HYBRID_BLIND_FAMILY_PREFIX_LEN || '2' }}
  HYBRID_BLIND_FAMILY_MAP_JSON: ${{ vars.HYBRID_BLIND_FAMILY_MAP_JSON || 'config/hybrid_blind_family_map.json' }}
  HYBRID_BLIND_FAMILY_SLICE_MAX_SNAPSHOTS: ${{ vars.HYBRID_BLIND_FAMILY_SLICE_MAX_SNAPSHOTS || '20' }}
  HYBRID_BLIND_GATE_CONFIG: ${{ vars.HYBRID_BLIND_GATE_CONFIG || 'config/hybrid_blind_gate.yaml' }}
  HYBRID_BLIND_FAIL_ON_GATE_FAILED: ${{ vars.HYBRID_BLIND_FAIL_ON_GATE_FAILED || 'false' }}
  HYBRID_BLIND_STRICT_REQUIRE_REAL_DATA: ${{ vars.HYBRID_BLIND_STRICT_REQUIRE_REAL_DATA || 'true' }}
  HYBRID_BLIND_DRIFT_ALERT_ENABLE: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_ENABLE || 'true' }}
  HYBRID_BLIND_DRIFT_ALERT_MIN_REPORTS: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_MIN_REPORTS || '2' }}
  HYBRID_BLIND_DRIFT_ALERT_MAX_ACC_DROP: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_MAX_ACC_DROP || '0.05' }}
  HYBRID_BLIND_DRIFT_ALERT_MAX_GAIN_DROP: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_MAX_GAIN_DROP || '0.05' }}
  HYBRID_BLIND_DRIFT_ALERT_MAX_COVERAGE_DROP: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_MAX_COVERAGE_DROP || '0.10' }}
  HYBRID_BLIND_DRIFT_ALERT_CONSECUTIVE_WINDOW: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_CONSECUTIVE_WINDOW || '2' }}
  HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_ENABLE: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_ENABLE || 'true' }}
  HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MIN_COMMON: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MIN_COMMON || '3' }}
  HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_AUTO_CAP_MIN_COMMON: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_AUTO_CAP_MIN_COMMON || 'true' }}
  HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MIN_SUPPORT: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MIN_SUPPORT || '3' }}
  HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MAX_ACC_DROP: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MAX_ACC_DROP || '0.15' }}
  HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MAX_GAIN_DROP: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MAX_GAIN_DROP || '0.15' }}
  HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_ENABLE: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_ENABLE || 'true' }}
  HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MIN_COMMON: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MIN_COMMON || '2' }}
  HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_AUTO_CAP_MIN_COMMON: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_AUTO_CAP_MIN_COMMON || 'true' }}
  HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MIN_SUPPORT: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MIN_SUPPORT || '5' }}
  HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MAX_ACC_DROP: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MAX_ACC_DROP || '0.20' }}
  HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MAX_GAIN_DROP: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MAX_GAIN_DROP || '0.20' }}
  HYBRID_BLIND_DRIFT_ALERT_ALLOW_MISSING: ${{ vars.HYBRID_BLIND_DRIFT_ALERT_ALLOW_MISSING || 'true' }}
jobs:
  evaluate:
    name: Run Evaluation and Generate Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0  # Fetch full history for git info

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        # Install optional dependencies for enhanced validation
        pip install jsonschema==4.21.1

    - name: Run eval_with_history regression unit tests
      run: |
        TESTS=(
          tests/unit/test_eval_with_history_script_history_sequence.py
          tests/unit/test_validate_eval_history_history_sequence.py
        )
        EXISTING=()
        for t in "${TESTS[@]}"; do
          if [[ -f "$t" ]]; then
            EXISTING+=("$t")
          else
            echo "[warn] missing regression test, skip: $t"
          fi
        done
        if [[ "${#EXISTING[@]}" -eq 0 ]]; then
          echo "[info] no eval_with_history regression tests found, skip."
          exit 0
        fi
        pytest -q "${EXISTING[@]}"

    - name: Run hybrid calibration regression unit tests
      run: |
        TESTS=(
          tests/unit/test_calibrate_hybrid_confidence_script.py
          tests/unit/test_hybrid_confidence_calibration_gate_check.py
        )
        EXISTING=()
        for t in "${TESTS[@]}"; do
          if [[ -f "$t" ]]; then
            EXISTING+=("$t")
          else
            echo "[warn] missing regression test, skip: $t"
          fi
        done
        if [[ "${#EXISTING[@]}" -eq 0 ]]; then
          echo "[info] no hybrid calibration regression tests found, skip."
          exit 0
        fi
        pytest -q "${EXISTING[@]}"

    - name: Run combined evaluation
      id: evaluation
      run: |
        # Use workflow inputs if provided, otherwise use defaults
        MIN_COMBINED="${{ github.event.inputs.min_combined || '0.8' }}"
        MIN_VISION="${{ github.event.inputs.min_vision || '0.65' }}"
        MIN_OCR="${{ github.event.inputs.min_ocr || '0.9' }}"

        echo "Running evaluation with thresholds:"
        echo "  Combined: $MIN_COMBINED"
        echo "  Vision: $MIN_VISION"
        echo "  OCR: $MIN_OCR"

        # Run evaluation and save history
        python3 scripts/evaluate_vision_ocr_combined.py \
          --save-history \
          --min-combined $MIN_COMBINED \
          --min-vision $MIN_VISION \
          --min-ocr $MIN_OCR | tee eval_output.txt

        # Extract scores for job summary
        echo "combined_score=$(grep -oP 'Combined Score: \K[0-9.]+' eval_output.txt || echo '0')" >> $GITHUB_OUTPUT
        echo "vision_score=$(grep -oP 'Vision Score: \K[0-9.]+' eval_output.txt || echo '0')" >> $GITHUB_OUTPUT
        echo "ocr_score=$(grep -oP 'OCR Score: \K[0-9.]+' eval_output.txt || echo '0')" >> $GITHUB_OUTPUT

    - name: Run history-sequence evaluation (optional)
      id: history_eval
      continue-on-error: true
      run: |
        mkdir -p reports/history_sequence_eval
        MANIFEST="${HISTORY_SEQUENCE_EVAL_MANIFEST:-}"
        H5_DIR="${HISTORY_SEQUENCE_EVAL_H5_DIR:-}"
        if [[ -z "$MANIFEST" && -z "$H5_DIR" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "No history-sequence dataset configured; skip."
          exit 0
        fi

        LABEL_SOURCE="manifest"
        if [[ -z "$MANIFEST" ]]; then
          LABEL_SOURCE="filename"
        fi

        BUILD_CMD=(
          python3 scripts/build_history_sequence_prototypes.py
          --label-source "$LABEL_SOURCE"
          --output reports/history_sequence_eval/prototypes.json
          --filename-min-conf "${HISTORY_SEQUENCE_FILENAME_MIN_CONF:-0.8}"
        )
        if [[ -n "$MANIFEST" ]]; then
          BUILD_CMD+=(--manifest "$MANIFEST")
        fi
        if [[ -n "$H5_DIR" ]]; then
          BUILD_CMD+=(--h5-dir "$H5_DIR")
        fi
        "${BUILD_CMD[@]}"

        TOKEN_WEIGHT="${HISTORY_SEQUENCE_PROTOTYPE_TOKEN_WEIGHT:-1.0}"
        BIGRAM_WEIGHT="${HISTORY_SEQUENCE_PROTOTYPE_BIGRAM_WEIGHT:-1.0}"
        WEIGHT_SOURCE="configured"
        TUNE_BEST_CONFIG=""
        if [[ "${HISTORY_SEQUENCE_TUNE_ENABLE:-false}" == "true" ]]; then
          TUNE_CMD=(
            python3 scripts/tune_history_sequence_weights.py
            --label-source "$LABEL_SOURCE"
            --prototypes-path reports/history_sequence_eval/prototypes.json
            --output-dir reports/history_sequence_eval/tuning
            --objective "${HISTORY_SEQUENCE_TUNE_OBJECTIVE:-macro_f1_overall}"
            --token-weight-grid "${HISTORY_SEQUENCE_TUNE_TOKEN_WEIGHT_GRID:-0.5,1.0,1.5}"
            --bigram-weight-grid "${HISTORY_SEQUENCE_TUNE_BIGRAM_WEIGHT_GRID:-0.0,0.5,1.0,1.5}"
            --filename-min-conf "${HISTORY_SEQUENCE_FILENAME_MIN_CONF:-0.8}"
          )
          if [[ -n "$MANIFEST" ]]; then
            TUNE_CMD+=(--manifest "$MANIFEST")
          fi
          if [[ -n "$H5_DIR" ]]; then
            TUNE_CMD+=(--h5-dir "$H5_DIR")
          fi
          "${TUNE_CMD[@]}"
          TUNE_BEST_CONFIG="reports/history_sequence_eval/tuning/best_config.json"
          if [[ -f "$TUNE_BEST_CONFIG" ]]; then
            read TOKEN_WEIGHT BIGRAM_WEIGHT < <(python3 -c 'import json; from pathlib import Path; payload=json.loads(Path("reports/history_sequence_eval/tuning/best_config.json").read_text(encoding="utf-8")); best=payload.get("best") or {}; print(best.get("token_weight", 1.0), best.get("bigram_weight", 1.0))')
            WEIGHT_SOURCE="tuned"
          fi
        fi

        RECOMMENDED_ENV="reports/history_sequence_eval/recommended_history_sequence.env"
        cat > "$RECOMMENDED_ENV" <<ENV
        # Auto-generated by evaluation-report.yml
        HISTORY_SEQUENCE_PROTOTYPE_TOKEN_WEIGHT=${TOKEN_WEIGHT}
        HISTORY_SEQUENCE_PROTOTYPE_BIGRAM_WEIGHT=${BIGRAM_WEIGHT}
        HISTORY_SEQUENCE_PROTOTYPES_PATH=reports/history_sequence_eval/prototypes.json
        ENV

        EVAL_CMD=(
          python3 scripts/eval_history_sequence_classifier.py
          --label-source "$LABEL_SOURCE"
          --prototypes-path reports/history_sequence_eval/prototypes.json
          --output-dir reports/history_sequence_eval
          --filename-min-conf "${HISTORY_SEQUENCE_FILENAME_MIN_CONF:-0.8}"
          --prototype-token-weight "$TOKEN_WEIGHT"
          --prototype-bigram-weight "$BIGRAM_WEIGHT"
        )
        if [[ -n "$MANIFEST" ]]; then
          EVAL_CMD+=(--manifest "$MANIFEST")
        fi
        if [[ -n "$H5_DIR" ]]; then
          EVAL_CMD+=(--h5-dir "$H5_DIR")
        fi
        "${EVAL_CMD[@]}"

        SUMMARY_PATH="reports/history_sequence_eval/summary.json"
        if [[ -f "$SUMMARY_PATH" ]]; then
          echo "enabled=true" >> $GITHUB_OUTPUT
          echo "summary_path=$SUMMARY_PATH" >> $GITHUB_OUTPUT
          echo "recommended_env=reports/history_sequence_eval/recommended_history_sequence.env" >> $GITHUB_OUTPUT
          echo "selected_token_weight=$TOKEN_WEIGHT" >> $GITHUB_OUTPUT
          echo "selected_bigram_weight=$BIGRAM_WEIGHT" >> $GITHUB_OUTPUT
          echo "weight_source=$WEIGHT_SOURCE" >> $GITHUB_OUTPUT
          echo "tune_objective=${HISTORY_SEQUENCE_TUNE_OBJECTIVE:-macro_f1_overall}" >> $GITHUB_OUTPUT
          python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path("reports/history_sequence_eval/summary.json").read_text(encoding="utf-8"))
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"coverage={payload.get('coverage', 0)}\n")
            f.write(f"accuracy_overall={payload.get('accuracy_overall', 0)}\n")
            f.write(f"macro_f1_overall={payload.get('macro_f1_overall', 0)}\n")
        PY
        else
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "History-sequence summary not found; skip artifact."
        fi

    - name: Validate evaluation history
      run: |
        python3 scripts/validate_eval_history.py --dir reports/eval_history

    - name: Check Graph2D blind gate (optional)
      id: graph2d_blind_gate
      run: |
        SUMMARY_PATH="${GRAPH2D_BLIND_SUMMARY_JSON:-}"
        if [[ -z "$SUMMARY_PATH" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "No GRAPH2D_BLIND_SUMMARY_JSON configured; skip."
          exit 0
        fi
        if [[ ! -f "$SUMMARY_PATH" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Graph2D blind summary not found: $SUMMARY_PATH"
          exit 0
        fi

        REPORT_PATH="reports/history_sequence_eval/graph2d_blind_gate_report.json"
        python3 scripts/ci/check_graph2d_blind_gate.py \
          --summary-json "$SUMMARY_PATH" \
          --config "${GRAPH2D_BLIND_GATE_CONFIG:-config/graph2d_blind_gate.yaml}" \
          --output "$REPORT_PATH"

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "summary_path=$SUMMARY_PATH" >> $GITHUB_OUTPUT
        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT

        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(
            Path("reports/history_sequence_eval/graph2d_blind_gate_report.json").read_text(
                encoding="utf-8"
            )
        )
        metrics = payload.get("metrics") or {}
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"status={payload.get('status', 'unknown')}\n")
            f.write(f"accuracy={metrics.get('accuracy', 0)}\n")
            f.write(f"top_pred_ratio={metrics.get('top_pred_ratio', 0)}\n")
            f.write(f"distinct_pred_labels={metrics.get('distinct_pred_labels', 0)}\n")
            f.write(f"low_conf_rate={metrics.get('low_conf_rate', 0)}\n")
        PY

    - name: Run Hybrid blind benchmark (optional)
      id: hybrid_blind_eval
      continue-on-error: true
      run: |
        ENABLE_OVERRIDE="${{ github.event.inputs.hybrid_blind_enable || '' }}"
        ENABLE_VALUE="${HYBRID_BLIND_ENABLE:-false}"
        if [[ -n "$ENABLE_OVERRIDE" ]]; then
          ENABLE_VALUE="$ENABLE_OVERRIDE"
        fi
        token="$(echo "$ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_enabled="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_enabled="true"
        fi
        if [[ "$is_enabled" != "true" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Hybrid blind benchmark disabled."
          exit 0
        fi

        DXF_DIR="${{ github.event.inputs.hybrid_blind_dxf_dir || '' }}"
        if [[ -z "$DXF_DIR" ]]; then
          DXF_DIR="${HYBRID_BLIND_DXF_DIR:-}"
        fi
        DATASET_SOURCE="configured_dxf_dir"
        SYNTH_MANIFEST="${{ github.event.inputs.hybrid_blind_synth_manifest || '' }}"
        if [[ -z "$SYNTH_MANIFEST" ]]; then
          SYNTH_MANIFEST="${HYBRID_BLIND_SYNTH_MANIFEST:-tests/golden/golden_dxf_hybrid_cases.json}"
        fi
        SYNTH_OUT_DIR="${HYBRID_BLIND_SYNTH_OUTPUT_DIR:-reports/history_sequence_eval/hybrid_blind_synth}"
        if [[ -n "$DXF_DIR" && ! -d "$DXF_DIR" ]]; then
          echo "Configured hybrid blind DXF dir not found: $DXF_DIR"
          DXF_DIR=""
        fi
        if [[ -z "$DXF_DIR" ]]; then
          if [[ ! -f "$SYNTH_MANIFEST" ]]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "Hybrid blind dxf dir is missing and synthetic manifest is unavailable: $SYNTH_MANIFEST"
            exit 0
          fi
          mkdir -p "$SYNTH_OUT_DIR"
          set +e
          synth_output=$(python3 scripts/ci/build_hybrid_blind_synthetic_dxf_dataset.py \
            --manifest "$SYNTH_MANIFEST" \
            --output-dir "$SYNTH_OUT_DIR" \
            --max-files "${HYBRID_BLIND_MAX_FILES:-200}" 2>&1)
          synth_exit_code=$?
          set -e
          echo "$synth_output"
          generated_count="$(echo "$synth_output" | sed -n 's/^generated=//p' | tail -n 1)"
          if [[ "$synth_exit_code" -ne 0 || -z "$generated_count" || "$generated_count" == "0" ]]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "Hybrid blind synthetic dataset build failed or empty."
            exit 0
          fi
          DXF_DIR="$SYNTH_OUT_DIR"
          DATASET_SOURCE="synthetic_manifest"
        fi

        MANIFEST_CSV="${{ github.event.inputs.hybrid_blind_manifest_csv || '' }}"
        if [[ -z "$MANIFEST_CSV" ]]; then
          MANIFEST_CSV="${HYBRID_BLIND_MANIFEST_CSV:-}"
        fi
        OUT_DIR="${HYBRID_BLIND_OUTPUT_DIR:-reports/history_sequence_eval/hybrid_blind}"
        mkdir -p "$OUT_DIR"
        CMD=(
          python3 scripts/batch_analyze_dxf_local.py
          --dxf-dir "$DXF_DIR"
          --output-dir "$OUT_DIR"
          --max-files "${HYBRID_BLIND_MAX_FILES:-200}"
          --seed "${HYBRID_BLIND_SEED:-22}"
          --geometry-only
        )
        if [[ -n "$MANIFEST_CSV" ]]; then
          if [[ -f "$MANIFEST_CSV" ]]; then
            CMD+=(--manifest "$MANIFEST_CSV")
          else
            echo "Manifest not found: $MANIFEST_CSV (ignored)"
          fi
        fi

        set +e
        "${CMD[@]}"
        EVAL_EXIT_CODE=$?
        set -e

        SUMMARY_JSON="$OUT_DIR/summary.json"
        if [[ ! -f "$SUMMARY_JSON" ]]; then
          echo "enabled=true" >> $GITHUB_OUTPUT
          echo "status=missing_summary" >> $GITHUB_OUTPUT
          echo "exit_code=$EVAL_EXIT_CODE" >> $GITHUB_OUTPUT
          echo "summary_json=$SUMMARY_JSON" >> $GITHUB_OUTPUT
          echo "dataset_source=$DATASET_SOURCE" >> $GITHUB_OUTPUT
          echo "dxf_dir=$DXF_DIR" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "status=ok" >> $GITHUB_OUTPUT
        echo "exit_code=$EVAL_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "summary_json=$SUMMARY_JSON" >> $GITHUB_OUTPUT
        echo "dataset_source=$DATASET_SOURCE" >> $GITHUB_OUTPUT
        echo "dxf_dir=$DXF_DIR" >> $GITHUB_OUTPUT
        echo "manifest_csv=$MANIFEST_CSV" >> $GITHUB_OUTPUT
        export HYBRID_BLIND_SUMMARY_JSON="$SUMMARY_JSON"
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path(os.environ["HYBRID_BLIND_SUMMARY_JSON"]).read_text(encoding="utf-8"))
        weak = payload.get("weak_labels") if isinstance(payload.get("weak_labels"), dict) else {}
        acc = weak.get("accuracy") if isinstance(weak.get("accuracy"), dict) else {}
        hybrid = acc.get("hybrid_label") if isinstance(acc.get("hybrid_label"), dict) else {}
        graph2d = acc.get("graph2d_label") if isinstance(acc.get("graph2d_label"), dict) else {}
        hybrid_acc = float(hybrid.get("accuracy") or 0.0)
        graph2d_acc = float(graph2d.get("accuracy") or 0.0)
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"sample_size={payload.get('sample_size', 0)}\n")
            f.write(f"weak_label_coverage={weak.get('covered_rate', 0)}\n")
            f.write(f"hybrid_accuracy={hybrid_acc}\n")
            f.write(f"graph2d_accuracy={graph2d_acc}\n")
            f.write(f"hybrid_gain_vs_graph2d={hybrid_acc - graph2d_acc}\n")
        PY

    - name: Check Hybrid blind gate (optional)
      id: hybrid_blind_gate
      if: steps.hybrid_blind_eval.outputs.enabled == 'true' && steps.hybrid_blind_eval.outputs.status == 'ok'
      continue-on-error: true
      run: |
        SUMMARY_JSON="${{ steps.hybrid_blind_eval.outputs.summary_json }}"
        if [[ -z "$SUMMARY_JSON" || ! -f "$SUMMARY_JSON" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Hybrid blind summary missing: $SUMMARY_JSON"
          exit 0
        fi
        REPORT_PATH="reports/history_sequence_eval/hybrid_blind_gate_report.json"
        mkdir -p "$(dirname "$REPORT_PATH")"

        set +e
        python3 scripts/ci/check_hybrid_blind_gate.py \
          --summary-json "$SUMMARY_JSON" \
          --config "${HYBRID_BLIND_GATE_CONFIG:-config/hybrid_blind_gate.yaml}" \
          --output "$REPORT_PATH"
        GATE_EXIT_CODE=$?
        set -e

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT
        echo "exit_code=$GATE_EXIT_CODE" >> $GITHUB_OUTPUT
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path("reports/history_sequence_eval/hybrid_blind_gate_report.json").read_text(encoding="utf-8"))
        metrics = payload.get("metrics") if isinstance(payload.get("metrics"), dict) else {}
        failures = payload.get("failures") if isinstance(payload.get("failures"), list) else []
        warnings = payload.get("warnings") if isinstance(payload.get("warnings"), list) else []
        first_failure = str(failures[0]).replace("\n", " ").replace("\r", " ").strip() if failures else ""
        first_warning = str(warnings[0]).replace("\n", " ").replace("\r", " ").strip() if warnings else ""
        headline = "passed"
        if payload.get("status") != "passed":
            headline = f"failed: {first_failure or 'unknown reason'}"
        elif first_warning:
            headline = f"passed_with_warning: {first_warning}"
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"status={payload.get('status', 'unknown')}\n")
            f.write(f"hybrid_accuracy={metrics.get('hybrid_accuracy', 0)}\n")
            f.write(f"graph2d_accuracy={metrics.get('graph2d_accuracy', 0)}\n")
            f.write(f"hybrid_gain_vs_graph2d={metrics.get('hybrid_gain_vs_graph2d', 0)}\n")
            f.write(f"weak_label_coverage={metrics.get('weak_label_coverage', 0)}\n")
            f.write(f"failure_count={len(failures)}\n")
            f.write(f"warning_count={len(warnings)}\n")
            f.write(f"headline={headline}\n")
        PY

    - name: Evaluate Hybrid blind gate strict mode (optional)
      id: hybrid_blind_gate_strict
      if: steps.hybrid_blind_gate.outputs.enabled == 'true'
      continue-on-error: true
      run: |
        STRICT_OVERRIDE="${{ github.event.inputs.hybrid_blind_fail_on_gate_failed || '' }}"
        STRICT_VALUE="${HYBRID_BLIND_FAIL_ON_GATE_FAILED:-false}"
        if [[ -n "$STRICT_OVERRIDE" ]]; then
          STRICT_VALUE="$STRICT_OVERRIDE"
        fi
        token="$(echo "$STRICT_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_strict="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_strict="true"
        fi
        gate_status="${{ steps.hybrid_blind_gate.outputs.status }}"
        dataset_source="${{ steps.hybrid_blind_eval.outputs.dataset_source }}"
        STRICT_REAL_OVERRIDE="${{ github.event.inputs.hybrid_blind_strict_require_real_data || '' }}"
        STRICT_REAL_VALUE="${HYBRID_BLIND_STRICT_REQUIRE_REAL_DATA:-true}"
        if [[ -n "$STRICT_REAL_OVERRIDE" ]]; then
          STRICT_REAL_VALUE="$STRICT_REAL_OVERRIDE"
        fi
        strict_real_token="$(echo "$STRICT_REAL_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        strict_require_real_data="false"
        if [[ "$strict_real_token" == "1" || "$strict_real_token" == "true" || "$strict_real_token" == "yes" || "$strict_real_token" == "on" ]]; then
          strict_require_real_data="true"
        fi
        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "strict_mode=$is_strict" >> $GITHUB_OUTPUT
        echo "gate_status=$gate_status" >> $GITHUB_OUTPUT
        echo "dataset_source=$dataset_source" >> $GITHUB_OUTPUT
        echo "strict_require_real_data=$strict_require_real_data" >> $GITHUB_OUTPUT
        if [[ "$is_strict" != "true" ]]; then
          echo "should_fail=false" >> $GITHUB_OUTPUT
          echo "reason=strict_mode_disabled" >> $GITHUB_OUTPUT
          echo "Hybrid blind strict mode disabled."
          exit 0
        fi
        if [[ "$strict_require_real_data" == "true" && "$dataset_source" != "configured_dxf_dir" ]]; then
          echo "should_fail=true" >> $GITHUB_OUTPUT
          echo "reason=strict_mode_requires_real_dataset" >> $GITHUB_OUTPUT
          echo "Hybrid blind strict mode requires configured_dxf_dir dataset source."
          exit 0
        fi
        if [[ "$gate_status" != "passed" ]]; then
          echo "should_fail=true" >> $GITHUB_OUTPUT
          echo "reason=gate_failed_under_strict_mode" >> $GITHUB_OUTPUT
          echo "Hybrid blind strict mode enabled and gate status is not passed."
          exit 0
        fi
        echo "should_fail=false" >> $GITHUB_OUTPUT
        echo "reason=gate_passed_under_strict_mode" >> $GITHUB_OUTPUT
        echo "Hybrid blind strict mode enabled and gate passed."

    - name: Archive Hybrid blind eval history snapshot (optional)
      id: hybrid_blind_history
      if: steps.hybrid_blind_eval.outputs.enabled == 'true' && steps.hybrid_blind_eval.outputs.status == 'ok'
      continue-on-error: true
      run: |
        SUMMARY_JSON="${{ steps.hybrid_blind_eval.outputs.summary_json }}"
        if [[ -z "$SUMMARY_JSON" || ! -f "$SUMMARY_JSON" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Hybrid blind summary missing; skip history archive."
          exit 0
        fi
        GATE_REPORT_JSON="${{ steps.hybrid_blind_gate.outputs.report_path }}"
        COMMIT_SHORT="$(echo "${GITHUB_SHA:-unknown}" | cut -c1-7)"
        PY_VERSION="$(python3 --version 2>&1 | awk '{print $2}')"
        set +e
        output_line=$(python3 scripts/ci/archive_hybrid_blind_eval_history.py \
          --summary-json "$SUMMARY_JSON" \
          --gate-report-json "$GATE_REPORT_JSON" \
          --output-dir reports/eval_history \
          --label-slice-min-support "${HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MIN_SUPPORT:-3}" \
          --label-slice-max-slices "${HYBRID_BLIND_LABEL_SLICE_MAX_SNAPSHOTS:-20}" \
          --family-prefix-len "${HYBRID_BLIND_FAMILY_PREFIX_LEN:-2}" \
          --family-map-json "${HYBRID_BLIND_FAMILY_MAP_JSON:-}" \
          --family-slice-max-slices "${HYBRID_BLIND_FAMILY_SLICE_MAX_SNAPSHOTS:-20}" \
          --branch "${GITHUB_REF_NAME:-unknown}" \
          --commit "$COMMIT_SHORT" \
          --runner "ci" \
          --machine "$(hostname)" \
          --os-info "$(uname -s) $(uname -r)" \
          --python-version "$PY_VERSION" \
          --ci-job-id "${GITHUB_RUN_ID:-}" \
          --ci-workflow "${GITHUB_WORKFLOW:-}" 2>&1)
        archive_exit_code=$?
        set -e
        echo "$output_line"
        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "exit_code=$archive_exit_code" >> $GITHUB_OUTPUT
        output_path="$(echo "$output_line" | tail -n 1 | sed -n 's/^output=//p')"
        echo "output_json=$output_path" >> $GITHUB_OUTPUT

    - name: Check Hybrid blind drift alerts (optional)
      id: hybrid_blind_drift_alert
      if: steps.hybrid_blind_eval.outputs.enabled == 'true' && steps.hybrid_blind_eval.outputs.status == 'ok'
      continue-on-error: true
      run: |
        ENABLE_OVERRIDE="${{ github.event.inputs.hybrid_blind_drift_alert_enable || '' }}"
        ENABLE_VALUE="${HYBRID_BLIND_DRIFT_ALERT_ENABLE:-true}"
        if [[ -n "$ENABLE_OVERRIDE" ]]; then
          ENABLE_VALUE="$ENABLE_OVERRIDE"
        fi
        token="$(echo "$ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_enabled="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_enabled="true"
        fi
        if [[ "$is_enabled" != "true" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Hybrid blind drift alert disabled."
          exit 0
        fi

        REPORT_PATH="reports/eval_history/hybrid_blind_drift_alert_report.json"
        REPORT_MD_PATH="reports/eval_history/hybrid_blind_drift_alert_report.md"
        mkdir -p "$(dirname "$REPORT_PATH")"
        CONSECUTIVE_OVERRIDE="${{ github.event.inputs.hybrid_blind_drift_alert_consecutive_window || '' }}"
        CONSECUTIVE_WINDOW="${HYBRID_BLIND_DRIFT_ALERT_CONSECUTIVE_WINDOW:-2}"
        if [[ -n "$CONSECUTIVE_OVERRIDE" ]]; then
          CONSECUTIVE_WINDOW="$CONSECUTIVE_OVERRIDE"
        fi
        LABEL_SLICE_ENABLE_OVERRIDE="${{ github.event.inputs.hybrid_blind_drift_alert_label_slice_enable || '' }}"
        LABEL_SLICE_ENABLE_VALUE="${HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_ENABLE:-true}"
        if [[ -n "$LABEL_SLICE_ENABLE_OVERRIDE" ]]; then
          LABEL_SLICE_ENABLE_VALUE="$LABEL_SLICE_ENABLE_OVERRIDE"
        fi
        LABEL_SLICE_MIN_COMMON="${HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MIN_COMMON:-3}"
        LABEL_SLICE_AUTO_CAP_MIN_COMMON_VALUE="${HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_AUTO_CAP_MIN_COMMON:-true}"
        LABEL_SLICE_MIN_SUPPORT="${HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MIN_SUPPORT:-3}"
        LABEL_SLICE_MAX_ACC_DROP="${HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MAX_ACC_DROP:-0.15}"
        LABEL_SLICE_MAX_GAIN_DROP="${HYBRID_BLIND_DRIFT_ALERT_LABEL_SLICE_MAX_GAIN_DROP:-0.15}"
        FAMILY_SLICE_ENABLE_OVERRIDE="${{ github.event.inputs.hybrid_blind_drift_alert_family_slice_enable || '' }}"
        FAMILY_SLICE_ENABLE_VALUE="${HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_ENABLE:-true}"
        if [[ -n "$FAMILY_SLICE_ENABLE_OVERRIDE" ]]; then
          FAMILY_SLICE_ENABLE_VALUE="$FAMILY_SLICE_ENABLE_OVERRIDE"
        fi
        FAMILY_SLICE_MIN_COMMON="${HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MIN_COMMON:-2}"
        FAMILY_SLICE_AUTO_CAP_MIN_COMMON_VALUE="${HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_AUTO_CAP_MIN_COMMON:-true}"
        FAMILY_SLICE_MIN_SUPPORT="${HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MIN_SUPPORT:-5}"
        FAMILY_SLICE_MAX_ACC_DROP="${HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MAX_ACC_DROP:-0.20}"
        FAMILY_SLICE_MAX_GAIN_DROP="${HYBRID_BLIND_DRIFT_ALERT_FAMILY_SLICE_MAX_GAIN_DROP:-0.20}"
        CMD=(
          python3 scripts/ci/check_hybrid_blind_drift_alerts.py
          --eval-history-dir reports/eval_history
          --output-json "$REPORT_PATH"
          --output-md "$REPORT_MD_PATH"
          --min-reports "${HYBRID_BLIND_DRIFT_ALERT_MIN_REPORTS:-2}"
          --max-hybrid-accuracy-drop "${HYBRID_BLIND_DRIFT_ALERT_MAX_ACC_DROP:-0.05}"
          --max-gain-drop "${HYBRID_BLIND_DRIFT_ALERT_MAX_GAIN_DROP:-0.05}"
          --max-coverage-drop "${HYBRID_BLIND_DRIFT_ALERT_MAX_COVERAGE_DROP:-0.10}"
          --consecutive-drop-window "$CONSECUTIVE_WINDOW"
        )
        label_slice_token="$(echo "$LABEL_SLICE_ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        if [[ "$label_slice_token" == "1" || "$label_slice_token" == "true" || "$label_slice_token" == "yes" || "$label_slice_token" == "on" ]]; then
          CMD+=(
            --label-slice-enable
            --label-slice-min-common "$LABEL_SLICE_MIN_COMMON"
            --label-slice-min-support "$LABEL_SLICE_MIN_SUPPORT"
            --label-slice-max-hybrid-accuracy-drop "$LABEL_SLICE_MAX_ACC_DROP"
            --label-slice-max-gain-drop "$LABEL_SLICE_MAX_GAIN_DROP"
          )
          label_slice_auto_cap_token="$(echo "$LABEL_SLICE_AUTO_CAP_MIN_COMMON_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
          if [[ "$label_slice_auto_cap_token" == "1" || "$label_slice_auto_cap_token" == "true" || "$label_slice_auto_cap_token" == "yes" || "$label_slice_auto_cap_token" == "on" ]]; then
            CMD+=(--label-slice-auto-cap-min-common)
          else
            CMD+=(--no-label-slice-auto-cap-min-common)
          fi
        fi
        family_slice_token="$(echo "$FAMILY_SLICE_ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        if [[ "$family_slice_token" == "1" || "$family_slice_token" == "true" || "$family_slice_token" == "yes" || "$family_slice_token" == "on" ]]; then
          CMD+=(
            --family-slice-enable
            --family-slice-min-common "$FAMILY_SLICE_MIN_COMMON"
            --family-slice-min-support "$FAMILY_SLICE_MIN_SUPPORT"
            --family-slice-max-hybrid-accuracy-drop "$FAMILY_SLICE_MAX_ACC_DROP"
            --family-slice-max-gain-drop "$FAMILY_SLICE_MAX_GAIN_DROP"
          )
          family_slice_auto_cap_token="$(echo "$FAMILY_SLICE_AUTO_CAP_MIN_COMMON_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
          if [[ "$family_slice_auto_cap_token" == "1" || "$family_slice_auto_cap_token" == "true" || "$family_slice_auto_cap_token" == "yes" || "$family_slice_auto_cap_token" == "on" ]]; then
            CMD+=(--family-slice-auto-cap-min-common)
          else
            CMD+=(--no-family-slice-auto-cap-min-common)
          fi
        fi
        allow_missing_token="$(echo "${HYBRID_BLIND_DRIFT_ALERT_ALLOW_MISSING:-true}" | tr '[:upper:]' '[:lower:]' | xargs)"
        if [[ "$allow_missing_token" == "1" || "$allow_missing_token" == "true" || "$allow_missing_token" == "yes" || "$allow_missing_token" == "on" ]]; then
          CMD+=(--allow-missing)
        fi

        set +e
        "${CMD[@]}"
        DRIFT_EXIT_CODE=$?
        set -e

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT
        echo "report_md_path=$REPORT_MD_PATH" >> $GITHUB_OUTPUT
        echo "exit_code=$DRIFT_EXIT_CODE" >> $GITHUB_OUTPUT

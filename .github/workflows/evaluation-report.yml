            )
            f.write(f"regression_count={len(regressions)}\n")
            f.write(f"improvement_count={len(improvements)}\n")
            f.write(f"resolved_focus_area_count={len(resolved_focus_areas)}\n")
            f.write(f"new_focus_area_count={len(new_focus_areas)}\n")
            f.write(f"regressions={compact(regressions)}\n")
            f.write(f"improvements={compact(improvements)}\n")
            f.write(f"resolved_focus_areas={compact(resolved_focus_areas)}\n")
            f.write(f"new_focus_areas={compact(new_focus_areas)}\n")
            f.write(f"domain_regressions={compact(domain_regressions)}\n")
            f.write(f"domain_improvements={compact(domain_improvements)}\n")
            f.write(
                "resolved_priority_domains="
                f"{compact(resolved_priority_domains)}\n"
            )
            f.write(f"new_priority_domains={compact(new_priority_domains)}\n")
            f.write(f"recommendations={compact(recommendations)}\n")
        PY


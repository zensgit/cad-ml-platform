            Path(os.environ["BENCHMARK_KNOWLEDGE_DRIFT_OUTPUT_JSON"]).read_text(
                encoding="utf-8"
            )
        )
        component = payload.get("knowledge_drift") or {}
        recommendations = payload.get("recommendations") or []

        def compact(items):
            return "; ".join(str(item).strip() for item in items[:3] if str(item).strip())

        regressions = [
            f"{row.get('component')}:{row.get('from_status')}->{row.get('to_status')}"
            for row in component.get("regressions") or []
            if row.get("component")
        ]
        improvements = [
            f"{row.get('component')}:{row.get('from_status')}->{row.get('to_status')}"
            for row in component.get("improvements") or []
            if row.get("component")
        ]
        resolved_focus_areas = component.get("resolved_focus_areas") or []
        new_focus_areas = component.get("new_focus_areas") or []
        domain_regressions = component.get("domain_regressions") or []
        domain_improvements = component.get("domain_improvements") or []
        resolved_priority_domains = component.get("resolved_priority_domains") or []
        new_priority_domains = component.get("new_priority_domains") or []

  MIN_COMBINED: ${{ vars.MIN_COMBINED || '0.8' }}
  MIN_VISION: ${{ vars.MIN_VISION || '0.65' }}
  MIN_OCR: ${{ vars.MIN_OCR || '0.9' }}

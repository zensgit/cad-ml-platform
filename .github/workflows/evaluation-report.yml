        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "output_json=$OUTPUT_JSON" >> $GITHUB_OUTPUT
        echo "output_md=$OUTPUT_MD" >> $GITHUB_OUTPUT
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(
            Path(os.environ["BENCHMARK_COMPANION_SUMMARY_OUTPUT_JSON"]).read_text(
                encoding="utf-8"
            )
        )
        component_statuses = payload.get("component_statuses") or {}
        blockers = payload.get("blockers") or []
        recommendations = payload.get("recommended_actions") or []
        focus_areas = payload.get("knowledge_focus_areas") or []
        drift = payload.get("knowledge_drift") or {}
        drift_recommendations = payload.get("knowledge_drift_recommendations") or []
        drift_changes = payload.get("knowledge_drift_component_changes") or []
        operator_drift = payload.get("operator_adoption_knowledge_drift") or {}
        operator_outcome_drift = (
            payload.get("operator_adoption_knowledge_outcome_drift") or {}
        )
        priority_domains = payload.get("knowledge_priority_domains") or []
        domain_focus_areas = payload.get("knowledge_domain_focus_areas") or []
        drift_domain_regressions = drift.get("domain_regressions") or []
        drift_domain_improvements = drift.get("domain_improvements") or []
        drift_resolved_domains = drift.get("resolved_priority_domains") or []
        drift_new_domains = drift.get("new_priority_domains") or []

        def compact(items):
            return "; ".join(str(item).strip() for item in items[:3] if str(item).strip())

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"overall_status={payload.get('overall_status', 'unknown')}\n")
            f.write(f"review_surface={payload.get('review_surface', 'unknown')}\n")
            f.write(f"primary_gap={payload.get('primary_gap', 'unknown')}\n")
            f.write(f"hybrid_status={component_statuses.get('hybrid', 'unknown')}\n")
            f.write(
                "assistant_status="
                f"{component_statuses.get('assistant_explainability', 'unknown')}\n"
            )
            f.write(
                f"review_queue_status={component_statuses.get('review_queue', 'unknown')}\n"
            )
            f.write(f"ocr_status={component_statuses.get('ocr_review', 'unknown')}\n")
            f.write(f"qdrant_status={component_statuses.get('qdrant_backend', 'unknown')}\n")
            f.write(
                "knowledge_status="
                f"{component_statuses.get('knowledge_readiness', 'unknown')}\n"
            )
            f.write(
                "engineering_status="
                f"{component_statuses.get('engineering_signals', 'unknown')}\n"
            )
            f.write(
                f"realdata_status={component_statuses.get('realdata_signals', 'unknown')}\n"
            )
            f.write(f"knowledge_drift_status={drift.get('status', 'unknown')}\n")
            f.write(
                "knowledge_drift_summary="
                f"{compact([payload.get('knowledge_drift_summary')])}\n"
            )
            f.write(
                "knowledge_drift_recommendations="
                f"{compact(drift_recommendations)}\n"
            )
            f.write(
                "knowledge_drift_component_changes="
                + compact(
                    [
                        f"{row.get('component')}:{row.get('direction')}"
                        for row in drift_changes
                        if row.get("component")
                    ]
                )

        import json
        import os
        from pathlib import Path

        payload = json.loads(
            Path(os.environ["BENCHMARK_RELEASE_RUNBOOK_OUTPUT_JSON"]).read_text(
                encoding="utf-8"
            )
        )
        drift = payload.get("knowledge_drift") or {}

        def compact(items):
            return "; ".join(str(item).strip() for item in items[:4] if str(item).strip())

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"release_status={payload.get('release_status', 'unknown')}\n")
            f.write(
                "ready_to_freeze_baseline="
                f"{str(payload.get('ready_to_freeze_baseline', False)).lower()}\n"
            )
            f.write(f"primary_signal_source={payload.get('primary_signal_source', 'none')}\n")
            f.write(f"next_action={payload.get('next_action', 'unknown')}\n")
            f.write(
                f"missing_artifacts={compact(payload.get('missing_artifacts') or [])}\n"
            )
            f.write(
                f"blocking_signals={compact(payload.get('blocking_signals') or [])}\n"
            )
            f.write(
                f"review_signals={compact(payload.get('review_signals') or [])}\n"
            )
            f.write(f"knowledge_status={payload.get('knowledge_status', 'unknown')}\n")
            focus_areas = payload.get("knowledge_focus_areas") or []
            priority_domains = payload.get("knowledge_priority_domains") or []
            domain_focus_areas = payload.get("knowledge_domain_focus_areas") or []
            f.write(f"knowledge_focus_area_count={len(focus_areas)}\n")
            f.write(
                "knowledge_focus_areas="
                + compact(
                    [
                        f"{row.get('component')}:{row.get('priority')}"
                        for row in focus_areas
                        if row.get("component")
                    ]
                )
                + "\n"
            )
            f.write(
                "knowledge_priority_domains="
                f"{compact(priority_domains)}\n"
            )
            f.write(
                "knowledge_domain_focus_areas="
                + compact(
                    [
                        f"{row.get('domain')}:{row.get('priority')}"
                        for row in domain_focus_areas
                        if row.get("domain")
                    ]
                )
                + "\n"
            )
            f.write(
                f"engineering_status={payload.get('engineering_status', 'unknown')}\n"
            )
            f.write(

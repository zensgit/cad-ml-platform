  BENCHMARK_RELEASE_RUNBOOK_KNOWLEDGE_DOMAIN_MATRIX_JSON: ${{ vars.BENCHMARK_RELEASE_RUNBOOK_KNOWLEDGE_DOMAIN_MATRIX_JSON }}
  BENCHMARK_RELEASE_RUNBOOK_KNOWLEDGE_OUTCOME_CORRELATION_JSON: ${{ vars.BENCHMARK_RELEASE_RUNBOOK_KNOWLEDGE_OUTCOME_CORRELATION_JSON }}
  BENCHMARK_RELEASE_RUNBOOK_OUTPUT_JSON: ${{ vars.BENCHMARK_RELEASE_RUNBOOK_OUTPUT_JSON || 'reports/history_sequence_eval/benchmark_release_runbook.json' }}
  BENCHMARK_RELEASE_RUNBOOK_OUTPUT_MD: ${{ vars.BENCHMARK_RELEASE_RUNBOOK_OUTPUT_MD || 'reports/history_sequence_eval/benchmark_release_runbook.md' }}
  BENCHMARK_OPERATOR_ADOPTION_ENABLE: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_ENABLE || 'false' }}
  BENCHMARK_OPERATOR_ADOPTION_TITLE: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_TITLE || 'Benchmark Operator Adoption' }}
  BENCHMARK_OPERATOR_ADOPTION_RELEASE_DECISION_JSON: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_RELEASE_DECISION_JSON }}
  BENCHMARK_OPERATOR_ADOPTION_RELEASE_RUNBOOK_JSON: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_RELEASE_RUNBOOK_JSON }}
  BENCHMARK_OPERATOR_ADOPTION_REVIEW_QUEUE_JSON: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_REVIEW_QUEUE_JSON }}
  BENCHMARK_OPERATOR_ADOPTION_FEEDBACK_FLYWHEEL_JSON: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_FEEDBACK_FLYWHEEL_JSON }}
  BENCHMARK_OPERATOR_ADOPTION_KNOWLEDGE_DRIFT_JSON: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_KNOWLEDGE_DRIFT_JSON }}
  BENCHMARK_OPERATOR_ADOPTION_KNOWLEDGE_OUTCOME_DRIFT_JSON: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_KNOWLEDGE_OUTCOME_DRIFT_JSON }}
  BENCHMARK_OPERATOR_ADOPTION_OUTPUT_JSON: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_OUTPUT_JSON || 'reports/history_sequence_eval/benchmark_operator_adoption.json' }}
  BENCHMARK_OPERATOR_ADOPTION_OUTPUT_MD: ${{ vars.BENCHMARK_OPERATOR_ADOPTION_OUTPUT_MD || 'reports/history_sequence_eval/benchmark_operator_adoption.md' }}
  OCR_REVIEW_PACK_ENABLE: ${{ vars.OCR_REVIEW_PACK_ENABLE || 'false' }}
  OCR_REVIEW_PACK_INPUT: ${{ vars.OCR_REVIEW_PACK_INPUT }}
  OCR_REVIEW_PACK_OUTPUT_CSV: ${{ vars.OCR_REVIEW_PACK_OUTPUT_CSV || 'reports/history_sequence_eval/ocr_review_pack.csv' }}
  OCR_REVIEW_PACK_OUTPUT_JSON: ${{ vars.OCR_REVIEW_PACK_OUTPUT_JSON || 'reports/history_sequence_eval/ocr_review_pack.json' }}
  OCR_REVIEW_PACK_TOP_K: ${{ vars.OCR_REVIEW_PACK_TOP_K || '100' }}
  OCR_REVIEW_PACK_INCLUDE_READY: ${{ vars.OCR_REVIEW_PACK_INCLUDE_READY || 'false' }}
  ASSISTANT_EVIDENCE_REPORT_ENABLE: ${{ vars.ASSISTANT_EVIDENCE_REPORT_ENABLE || 'false' }}
  ASSISTANT_EVIDENCE_REPORT_INPUT: ${{ vars.ASSISTANT_EVIDENCE_REPORT_INPUT }}
  ASSISTANT_EVIDENCE_REPORT_OUTPUT_CSV: ${{ vars.ASSISTANT_EVIDENCE_REPORT_OUTPUT_CSV || 'reports/history_sequence_eval/assistant_evidence_report.csv' }}
  ASSISTANT_EVIDENCE_REPORT_OUTPUT_JSON: ${{ vars.ASSISTANT_EVIDENCE_REPORT_OUTPUT_JSON || 'reports/history_sequence_eval/assistant_evidence_report.json' }}
  ASSISTANT_EVIDENCE_REPORT_TOP_K: ${{ vars.ASSISTANT_EVIDENCE_REPORT_TOP_K || '50' }}
  ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_ENABLE: ${{ vars.ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_ENABLE || 'false' }}
  ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_INPUT: ${{ vars.ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_INPUT }}
  ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_OUTPUT_JSON: ${{ vars.ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_OUTPUT_JSON || 'reports/history_sequence_eval/active_learning_review_queue_report.json' }}
  ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_OUTPUT_CSV: ${{ vars.ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_OUTPUT_CSV || 'reports/history_sequence_eval/active_learning_review_queue_report.csv' }}
  ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_TOP_K: ${{ vars.ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_TOP_K || '20' }}

jobs:
  evaluate:
    name: Run Evaluation and Generate Report
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for git info

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        # Install optional dependencies for enhanced validation
        pip install jsonschema==4.21.1

    - name: Run combined evaluation
      id: evaluation
      run: |
        # Use workflow inputs if provided, otherwise use defaults
        MIN_COMBINED="${{ github.event.inputs.min_combined || '0.8' }}"
        MIN_VISION="${{ github.event.inputs.min_vision || '0.65' }}"
        MIN_OCR="${{ github.event.inputs.min_ocr || '0.9' }}"

        echo "Running evaluation with thresholds:"
        echo "  Combined: $MIN_COMBINED"
        echo "  Vision: $MIN_VISION"
        echo "  OCR: $MIN_OCR"

        # Run evaluation and save history
        python3 scripts/evaluate_vision_ocr_combined.py \
          --save-history \
          --min-combined $MIN_COMBINED \
          --min-vision $MIN_VISION \
          --min-ocr $MIN_OCR | tee eval_output.txt

        # Extract scores for job summary
        echo "combined_score=$(grep -oP 'Combined Score: \K[0-9.]+' eval_output.txt || echo '0')" >> $GITHUB_OUTPUT
        echo "vision_score=$(grep -oP 'Vision Score: \K[0-9.]+' eval_output.txt || echo '0')" >> $GITHUB_OUTPUT
        echo "ocr_score=$(grep -oP 'OCR Score: \K[0-9.]+' eval_output.txt || echo '0')" >> $GITHUB_OUTPUT

    - name: Run history-sequence evaluation (optional)
      id: history_eval
      continue-on-error: true
      run: |
        mkdir -p reports/history_sequence_eval
        MANIFEST="${HISTORY_SEQUENCE_EVAL_MANIFEST:-}"
        H5_DIR="${HISTORY_SEQUENCE_EVAL_H5_DIR:-}"
        if [[ -z "$MANIFEST" && -z "$H5_DIR" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "No history-sequence dataset configured; skip."
          exit 0
        fi

        LABEL_SOURCE="manifest"
        if [[ -z "$MANIFEST" ]]; then
          LABEL_SOURCE="filename"
        fi

        BUILD_CMD=(
          python3 scripts/build_history_sequence_prototypes.py
          --label-source "$LABEL_SOURCE"
          --output reports/history_sequence_eval/prototypes.json
          --filename-min-conf "${HISTORY_SEQUENCE_FILENAME_MIN_CONF:-0.8}"
        )
        if [[ -n "$MANIFEST" ]]; then
          BUILD_CMD+=(--manifest "$MANIFEST")
        fi
        if [[ -n "$H5_DIR" ]]; then
          BUILD_CMD+=(--h5-dir "$H5_DIR")
        fi
        "${BUILD_CMD[@]}"

        TOKEN_WEIGHT="${HISTORY_SEQUENCE_PROTOTYPE_TOKEN_WEIGHT:-1.0}"
        BIGRAM_WEIGHT="${HISTORY_SEQUENCE_PROTOTYPE_BIGRAM_WEIGHT:-1.0}"
        WEIGHT_SOURCE="configured"
        TUNE_BEST_CONFIG=""
        if [[ "${HISTORY_SEQUENCE_TUNE_ENABLE:-false}" == "true" ]]; then
          TUNE_CMD=(
            python3 scripts/tune_history_sequence_weights.py
            --label-source "$LABEL_SOURCE"
            --prototypes-path reports/history_sequence_eval/prototypes.json
            --output-dir reports/history_sequence_eval/tuning
            --objective "${HISTORY_SEQUENCE_TUNE_OBJECTIVE:-macro_f1_overall}"
            --token-weight-grid "${HISTORY_SEQUENCE_TUNE_TOKEN_WEIGHT_GRID:-0.5,1.0,1.5}"
            --bigram-weight-grid "${HISTORY_SEQUENCE_TUNE_BIGRAM_WEIGHT_GRID:-0.0,0.5,1.0,1.5}"
            --filename-min-conf "${HISTORY_SEQUENCE_FILENAME_MIN_CONF:-0.8}"
          )
          if [[ -n "$MANIFEST" ]]; then
            TUNE_CMD+=(--manifest "$MANIFEST")
          fi
          if [[ -n "$H5_DIR" ]]; then
            TUNE_CMD+=(--h5-dir "$H5_DIR")
          fi
          "${TUNE_CMD[@]}"
          TUNE_BEST_CONFIG="reports/history_sequence_eval/tuning/best_config.json"
          if [[ -f "$TUNE_BEST_CONFIG" ]]; then
            read TOKEN_WEIGHT BIGRAM_WEIGHT < <(python3 -c 'import json; from pathlib import Path; payload=json.loads(Path("reports/history_sequence_eval/tuning/best_config.json").read_text(encoding="utf-8")); best=payload.get("best") or {}; print(best.get("token_weight", 1.0), best.get("bigram_weight", 1.0))')
            WEIGHT_SOURCE="tuned"
          fi
        fi

        RECOMMENDED_ENV="reports/history_sequence_eval/recommended_history_sequence.env"
        cat > "$RECOMMENDED_ENV" <<ENV
        # Auto-generated by evaluation-report.yml
        HISTORY_SEQUENCE_PROTOTYPE_TOKEN_WEIGHT=${TOKEN_WEIGHT}
        HISTORY_SEQUENCE_PROTOTYPE_BIGRAM_WEIGHT=${BIGRAM_WEIGHT}
        HISTORY_SEQUENCE_PROTOTYPES_PATH=reports/history_sequence_eval/prototypes.json
        ENV

        EVAL_CMD=(
          python3 scripts/eval_history_sequence_classifier.py
          --label-source "$LABEL_SOURCE"
          --prototypes-path reports/history_sequence_eval/prototypes.json
          --output-dir reports/history_sequence_eval
          --filename-min-conf "${HISTORY_SEQUENCE_FILENAME_MIN_CONF:-0.8}"
          --prototype-token-weight "$TOKEN_WEIGHT"
          --prototype-bigram-weight "$BIGRAM_WEIGHT"
        )
        if [[ -n "$MANIFEST" ]]; then
          EVAL_CMD+=(--manifest "$MANIFEST")
        fi
        if [[ -n "$H5_DIR" ]]; then
          EVAL_CMD+=(--h5-dir "$H5_DIR")
        fi
        "${EVAL_CMD[@]}"

        SUMMARY_PATH="reports/history_sequence_eval/summary.json"
        if [[ -f "$SUMMARY_PATH" ]]; then
          echo "enabled=true" >> $GITHUB_OUTPUT
          echo "summary_path=$SUMMARY_PATH" >> $GITHUB_OUTPUT
          echo "recommended_env=reports/history_sequence_eval/recommended_history_sequence.env" >> $GITHUB_OUTPUT
          echo "selected_token_weight=$TOKEN_WEIGHT" >> $GITHUB_OUTPUT
          echo "selected_bigram_weight=$BIGRAM_WEIGHT" >> $GITHUB_OUTPUT
          echo "weight_source=$WEIGHT_SOURCE" >> $GITHUB_OUTPUT
          echo "tune_objective=${HISTORY_SEQUENCE_TUNE_OBJECTIVE:-macro_f1_overall}" >> $GITHUB_OUTPUT
          python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path("reports/history_sequence_eval/summary.json").read_text(encoding="utf-8"))
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"coverage={payload.get('coverage', 0)}\n")
            f.write(f"accuracy_overall={payload.get('accuracy_overall', 0)}\n")
            f.write(f"macro_f1_overall={payload.get('macro_f1_overall', 0)}\n")
        PY
        else
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "History-sequence summary not found; skip artifact."
        fi

    - name: Validate evaluation history
      run: |
        python3 scripts/validate_eval_history.py --dir reports/eval_history

    - name: Check Graph2D blind gate (optional)
      id: graph2d_blind_gate
      run: |
        SUMMARY_PATH="${GRAPH2D_BLIND_SUMMARY_JSON:-}"
        if [[ -z "$SUMMARY_PATH" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "No GRAPH2D_BLIND_SUMMARY_JSON configured; skip."
          exit 0
        fi
        if [[ ! -f "$SUMMARY_PATH" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Graph2D blind summary not found: $SUMMARY_PATH"
          exit 0
        fi

        REPORT_PATH="reports/history_sequence_eval/graph2d_blind_gate_report.json"
        python3 scripts/ci/check_graph2d_blind_gate.py \
          --summary-json "$SUMMARY_PATH" \
          --config "${GRAPH2D_BLIND_GATE_CONFIG:-config/graph2d_blind_gate.yaml}" \
          --output "$REPORT_PATH"

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "summary_path=$SUMMARY_PATH" >> $GITHUB_OUTPUT
        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT

        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(
            Path("reports/history_sequence_eval/graph2d_blind_gate_report.json").read_text(
                encoding="utf-8"
            )
        )
        metrics = payload.get("metrics") or {}
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"status={payload.get('status', 'unknown')}\n")
            f.write(f"accuracy={metrics.get('accuracy', 0)}\n")
            f.write(f"top_pred_ratio={metrics.get('top_pred_ratio', 0)}\n")
            f.write(f"distinct_pred_labels={metrics.get('distinct_pred_labels', 0)}\n")
            f.write(f"low_conf_rate={metrics.get('low_conf_rate', 0)}\n")
        PY

    - name: Download review-pack input artifact (optional)
      id: graph2d_review_pack_input_artifact
      if: >-
        (github.event.inputs.review_pack_input_artifact_name != '' ||
        env.GRAPH2D_REVIEW_PACK_INPUT_ARTIFACT_NAME != '') &&
        (github.event.inputs.review_pack_input_artifact_run_id != '' ||
        env.GRAPH2D_REVIEW_PACK_INPUT_ARTIFACT_RUN_ID != '')
      uses: actions/download-artifact@v4
      with:
        name: ${{ github.event.inputs.review_pack_input_artifact_name || env.GRAPH2D_REVIEW_PACK_INPUT_ARTIFACT_NAME }}
        repository: ${{ github.event.inputs.review_pack_input_artifact_repository || env.GRAPH2D_REVIEW_PACK_INPUT_ARTIFACT_REPOSITORY || github.repository }}
        run-id: ${{ github.event.inputs.review_pack_input_artifact_run_id || env.GRAPH2D_REVIEW_PACK_INPUT_ARTIFACT_RUN_ID }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: .tmp/graph2d-review-pack-input

    - name: Build hybrid rejection review pack (optional)
      id: graph2d_review_pack
      continue-on-error: true
      run: |
        INPUT_CSV="${{ github.event.inputs.review_pack_input_csv || '' }}"
        if [[ -z "$INPUT_CSV" ]]; then
          INPUT_CSV="${GRAPH2D_REVIEW_PACK_INPUT_CSV:-}"
        fi
        ARTIFACT_INPUT_PATH="${{ github.event.inputs.review_pack_input_artifact_path || '' }}"
        if [[ -z "$ARTIFACT_INPUT_PATH" ]]; then
          ARTIFACT_INPUT_PATH="${GRAPH2D_REVIEW_PACK_INPUT_ARTIFACT_PATH:-}"
        fi
        ARTIFACT_INPUT_DIR=".tmp/graph2d-review-pack-input"
        RESOLVED_INPUT_CSV=""
        INPUT_SOURCE=""

        if [[ -n "$INPUT_CSV" && -f "$INPUT_CSV" ]]; then
          RESOLVED_INPUT_CSV="$INPUT_CSV"
          INPUT_SOURCE="workspace"
        fi

        if [[ -z "$RESOLVED_INPUT_CSV" && -d "$ARTIFACT_INPUT_DIR" ]]; then
          if [[ -n "$ARTIFACT_INPUT_PATH" && -f "$ARTIFACT_INPUT_DIR/$ARTIFACT_INPUT_PATH" ]]; then
            RESOLVED_INPUT_CSV="$ARTIFACT_INPUT_DIR/$ARTIFACT_INPUT_PATH"
            INPUT_SOURCE="artifact"
          else
            FOUND_ARTIFACT_CSV="$(find "$ARTIFACT_INPUT_DIR" -type f -name '*.csv' | sort | head -n 1 || true)"
            if [[ -n "$FOUND_ARTIFACT_CSV" ]]; then
              RESOLVED_INPUT_CSV="$FOUND_ARTIFACT_CSV"
              INPUT_SOURCE="artifact"
            fi
          fi
        fi

        if [[ -z "$RESOLVED_INPUT_CSV" && -n "$INPUT_CSV" ]]; then
          echo "Configured review-pack input CSV not found in workspace: $INPUT_CSV"
        fi
        if [[ -z "$RESOLVED_INPUT_CSV" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "No review-pack input configured/found (workspace path or downloaded artifact); skip."
          exit 0
        fi

        OUTPUT_CSV="${GRAPH2D_REVIEW_PACK_OUTPUT_CSV:-reports/history_sequence_eval/hybrid_review_pack.csv}"
        SUMMARY_JSON="${GRAPH2D_REVIEW_PACK_SUMMARY_JSON:-reports/history_sequence_eval/hybrid_review_pack_summary.json}"
        mkdir -p "$(dirname "$OUTPUT_CSV")"
        mkdir -p "$(dirname "$SUMMARY_JSON")"

        python3 scripts/export_hybrid_rejection_review_pack.py \
          --input-csv "$RESOLVED_INPUT_CSV" \
          --output-csv "$OUTPUT_CSV" \
          --summary-json "$SUMMARY_JSON" \
          --low-confidence-threshold "${GRAPH2D_REVIEW_PACK_LOW_CONF_THRESHOLD:-0.6}" \
          --top-k "${GRAPH2D_REVIEW_PACK_TOP_K:-200}"

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "input_csv=$RESOLVED_INPUT_CSV" >> $GITHUB_OUTPUT
        echo "input_source=${INPUT_SOURCE:-unknown}" >> $GITHUB_OUTPUT
        echo "output_csv=$OUTPUT_CSV" >> $GITHUB_OUTPUT
        echo "summary_json=$SUMMARY_JSON" >> $GITHUB_OUTPUT
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path(os.environ["GRAPH2D_REVIEW_PACK_SUMMARY_JSON"]).read_text(encoding="utf-8"))
        def compact_named(items, limit=3):
            out = []
            for item in (items or [])[:limit]:
                if not isinstance(item, dict):
                    continue
                name = str(item.get("name") or "").strip()
                count = item.get("count")
                if not name:
                    continue
                out.append(f"{name}({count})")
            return "; ".join(out)

        def compact_texts(items, limit=2):
            out = []
            for value in (items or [])[:limit]:
                text = str(value or "").replace("\n", " ").replace("\r", " ").strip()
                if text:
                    out.append(text[:160])
            return " | ".join(out)

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"candidate_rows={payload.get('candidate_rows', 0)}\n")
            f.write(f"hybrid_rejected_count={payload.get('hybrid_rejected_count', 0)}\n")
            f.write(f"conflict_count={payload.get('conflict_count', 0)}\n")
            f.write(f"low_confidence_count={payload.get('low_confidence_count', 0)}\n")
            f.write(f"knowledge_conflict_count={payload.get('knowledge_conflict_count', 0)}\n")
            f.write(f"knowledge_check_row_count={payload.get('knowledge_check_row_count', 0)}\n")
            f.write(f"standards_candidate_row_count={payload.get('standards_candidate_row_count', 0)}\n")
            f.write(f"top_review_reasons={compact_named(payload.get('top_review_reasons'))}\n")
            f.write(f"top_review_priorities={compact_named(payload.get('top_review_priorities'))}\n")
            f.write(f"top_confidence_bands={compact_named(payload.get('top_confidence_bands'))}\n")
            f.write(f"top_coarse_labels={compact_named(payload.get('top_coarse_labels'))}\n")
            f.write(f"top_fine_labels={compact_named(payload.get('top_fine_labels'))}\n")
            f.write(f"top_rejection_reasons={compact_named(payload.get('top_rejection_reasons'))}\n")
            f.write(f"top_knowledge_conflicts={compact_named(payload.get('top_knowledge_conflicts'))}\n")
            f.write(f"top_knowledge_check_categories={compact_named(payload.get('top_knowledge_check_categories'))}\n")
            f.write(f"top_standard_candidate_types={compact_named(payload.get('top_standard_candidate_types'))}\n")
            f.write(f"top_knowledge_hint_labels={compact_named(payload.get('top_knowledge_hint_labels'))}\n")
            f.write(f"top_primary_sources={compact_named(payload.get('top_primary_sources'))}\n")
            f.write(f"top_shadow_sources={compact_named(payload.get('top_shadow_sources'))}\n")
            f.write(f"sample_explanations={compact_texts(payload.get('sample_explanations'))}\n")
        PY

    - name: Run Graph2D train recipe sweep (optional)
      id: graph2d_train_sweep
      continue-on-error: true
      run: |
        if [[ "${GRAPH2D_TRAIN_SWEEP_ENABLE:-false}" != "true" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "GRAPH2D_TRAIN_SWEEP_ENABLE is not true; skip."
          exit 0
        fi

        WORK_ROOT="${GRAPH2D_TRAIN_SWEEP_WORK_ROOT:-reports/history_sequence_eval/graph2d_train_recipe_sweep}"
        mkdir -p "$WORK_ROOT"
        CMD=(
          python3 scripts/sweep_graph2d_train_recipes.py
          --recipes "${GRAPH2D_TRAIN_SWEEP_RECIPES:-baseline,focal_balanced}"
          --seeds "${GRAPH2D_TRAIN_SWEEP_SEEDS:-7,21,42}"
          --max-runs "${GRAPH2D_TRAIN_SWEEP_MAX_RUNS:-0}"
          --base-args-json "${GRAPH2D_TRAIN_SWEEP_BASE_ARGS_JSON:-[]}"
          --work-root "$WORK_ROOT"
        )
        if [[ "${GRAPH2D_TRAIN_SWEEP_EXECUTE:-false}" == "true" ]]; then
          CMD+=(--execute)
          if [[ "${GRAPH2D_TRAIN_SWEEP_FAIL_ON_ERROR:-false}" == "true" ]]; then
            CMD+=(--fail-on-error)
          fi
        fi

        set +e
        "${CMD[@]}"
        SWEEP_EXIT_CODE=$?
        set -e

        SUMMARY_JSON="$WORK_ROOT/train_recipe_sweep_summary.json"
        RESULTS_CSV="$WORK_ROOT/train_recipe_sweep_results.csv"
        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "exit_code=$SWEEP_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "work_root=$WORK_ROOT" >> $GITHUB_OUTPUT
        echo "summary_json=$SUMMARY_JSON" >> $GITHUB_OUTPUT
        echo "results_csv=$RESULTS_CSV" >> $GITHUB_OUTPUT

        if [[ -f "$SUMMARY_JSON" ]]; then
          python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path(os.environ["GRAPH2D_TRAIN_SWEEP_WORK_ROOT"]).joinpath("train_recipe_sweep_summary.json").read_text(encoding="utf-8"))
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"total_runs={payload.get('total_runs', 0)}\n")
            f.write(f"executed_runs={payload.get('executed_runs', 0)}\n")
            f.write(f"failed_runs={payload.get('failed_runs', 0)}\n")
            f.write(f"best_recipe={payload.get('best_recipe', '')}\n")
            f.write(f"best_seed={payload.get('best_seed', '')}\n")
            f.write(f"best_val_acc={payload.get('best_val_acc', 0)}\n")
            f.write(f"recommended_env_file={payload.get('recommended_env_file', '')}\n")
            f.write(f"best_run_script={payload.get('best_run_script', '')}\n")
        PY
        fi

    - name: Build OCR review pack (optional)
      id: ocr_review_pack
      continue-on-error: true
      run: |
        ENABLE_OVERRIDE="${{ github.event.inputs.ocr_review_pack_enable || '' }}"
        ENABLE_VALUE="${OCR_REVIEW_PACK_ENABLE:-false}"
        if [[ -n "$ENABLE_OVERRIDE" ]]; then
          ENABLE_VALUE="$ENABLE_OVERRIDE"
        fi
        ENABLE_TOKEN="$(echo "$ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        if [[ "$ENABLE_TOKEN" != "1" && "$ENABLE_TOKEN" != "true" && "$ENABLE_TOKEN" != "yes" && "$ENABLE_TOKEN" != "on" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "OCR_REVIEW_PACK_ENABLE is not true; skip."
          exit 0
        fi

        INPUT_PATH="${{ github.event.inputs.ocr_review_pack_input || '' }}"
        if [[ -z "$INPUT_PATH" ]]; then
          INPUT_PATH="${OCR_REVIEW_PACK_INPUT:-}"
        fi

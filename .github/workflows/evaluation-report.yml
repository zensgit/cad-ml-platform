    - name: Build benchmark release decision (optional)
      id: benchmark_release_decision
      continue-on-error: true
      run: |
        ENABLE_OVERRIDE="${{ github.event.inputs.benchmark_release_decision_enable || '' }}"
        ENABLE_VALUE="${BENCHMARK_RELEASE_DECISION_ENABLE:-false}"
        if [[ -n "$ENABLE_OVERRIDE" ]]; then
          ENABLE_VALUE="$ENABLE_OVERRIDE"
        fi
        ENABLE_TOKEN="$(echo "$ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"

        OUTPUT_JSON="${BENCHMARK_RELEASE_DECISION_OUTPUT_JSON:-reports/history_sequence_eval/benchmark_release_decision.json}"
        OUTPUT_MD="${BENCHMARK_RELEASE_DECISION_OUTPUT_MD:-reports/history_sequence_eval/benchmark_release_decision.md}"
        mkdir -p "$(dirname "$OUTPUT_JSON")"
        mkdir -p "$(dirname "$OUTPUT_MD")"

        CMD=(
          python3 scripts/export_benchmark_release_decision.py
          --title "${BENCHMARK_RELEASE_DECISION_TITLE:-Benchmark Release Decision}"
          --output-json "$OUTPUT_JSON"
          --output-md "$OUTPUT_MD"
        )
        INPUT_COUNT=0

        add_if_exists() {
          local flag="$1"
          local candidate="$2"
          if [[ -n "$candidate" && -f "$candidate" ]]; then
            CMD+=("$flag" "$candidate")
            INPUT_COUNT=$((INPUT_COUNT + 1))
          fi
        }

        add_if_exists --benchmark-scorecard "${{ github.event.inputs.benchmark_release_decision_scorecard_json || '' }}"

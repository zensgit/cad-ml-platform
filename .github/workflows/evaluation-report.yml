            f.write(f"primary_gap_counts={compact_named(summary.get('primary_gap_counts'))}\n")
            f.write(f"top_review_reasons={compact_named(summary.get('top_review_reasons'))}\n")
            f.write(f"top_recommended_actions={compact_named(summary.get('top_recommended_actions'))}\n")
        PY


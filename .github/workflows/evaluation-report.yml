                name = str(item.get("name") or "").strip()
                count = item.get("count")
                if name:
                    out.append(f"{name}({count})")
            return "; ".join(out)

        coverage = payload.get("coverage") or {}
        records_with_evidence = coverage.get("records_with_evidence") or {}
        records_with_decision_path = coverage.get("records_with_decision_path") or {}
        records_with_any_source_signal = coverage.get("records_with_any_source_signal") or {}

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"total_records={payload.get('total_records', 0)}\n")
            f.write(f"total_evidence_items={payload.get('total_evidence_items', 0)}\n")
            f.write(f"average_evidence_count={payload.get('average_evidence_count', 0)}\n")
            f.write(
                f"records_with_evidence_pct={records_with_evidence.get('coverage_pct', 0)}\n"
            )
            f.write(
                f"records_with_decision_path_pct={records_with_decision_path.get('coverage_pct', 0)}\n"
            )
            f.write(
                f"records_with_any_source_signal_pct={records_with_any_source_signal.get('coverage_pct', 0)}\n"
            )
            f.write(f"top_record_kinds={compact_named(payload.get('top_record_kinds'))}\n")
            f.write(f"top_evidence_types={compact_named(payload.get('top_evidence_types'))}\n")
            f.write(
                f"top_structured_sources={compact_named(payload.get('top_structured_sources'))}\n"
            )
            f.write(f"top_missing_fields={compact_named(payload.get('top_missing_fields'))}\n")
        PY

    - name: Check Graph2D review-pack gate (optional)
      id: graph2d_review_gate
      continue-on-error: true
      run: |
        if [[ "${{ steps.graph2d_review_pack.outputs.enabled }}" != "true" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Review pack step not enabled; skip gate."
          exit 0
        fi

        SUMMARY_JSON="${{ steps.graph2d_review_pack.outputs.summary_json }}"
        if [[ -z "$SUMMARY_JSON" || ! -f "$SUMMARY_JSON" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Review pack summary not found: $SUMMARY_JSON"
          exit 0
        fi

        REPORT_PATH="${GRAPH2D_REVIEW_PACK_GATE_REPORT:-reports/history_sequence_eval/graph2d_review_pack_gate_report.json}"
        mkdir -p "$(dirname "$REPORT_PATH")"
        OVERRIDE_MIN_TOTAL_ROWS="${{ env.REVIEW_GATE_MIN_TOTAL_ROWS || '' }}"
        OVERRIDE_MAX_CANDIDATE_RATE="${{ env.REVIEW_GATE_MAX_CANDIDATE_RATE || '' }}"
        OVERRIDE_MAX_HYBRID_REJECTED_RATE="${{ env.REVIEW_GATE_MAX_HYBRID_REJECTED_RATE || '' }}"
        OVERRIDE_MAX_CONFLICT_RATE="${{ env.REVIEW_GATE_MAX_CONFLICT_RATE || '' }}"
        OVERRIDE_MAX_LOW_CONF_RATE="${{ env.REVIEW_GATE_MAX_LOW_CONFIDENCE_RATE || '' }}"

        CMD=(
          python3 scripts/ci/check_graph2d_review_pack_gate.py
          --summary-json "$SUMMARY_JSON"
          --config "${GRAPH2D_REVIEW_PACK_GATE_CONFIG:-config/graph2d_review_pack_gate.yaml}"
          --output "$REPORT_PATH"
        )
        if [[ -n "$OVERRIDE_MIN_TOTAL_ROWS" ]]; then
          CMD+=(--min-total-rows "$OVERRIDE_MIN_TOTAL_ROWS")
        fi
        if [[ -n "$OVERRIDE_MAX_CANDIDATE_RATE" ]]; then
          CMD+=(--max-candidate-rate "$OVERRIDE_MAX_CANDIDATE_RATE")
        fi
        if [[ -n "$OVERRIDE_MAX_HYBRID_REJECTED_RATE" ]]; then
          CMD+=(--max-hybrid-rejected-rate "$OVERRIDE_MAX_HYBRID_REJECTED_RATE")
        fi
        if [[ -n "$OVERRIDE_MAX_CONFLICT_RATE" ]]; then
          CMD+=(--max-conflict-rate "$OVERRIDE_MAX_CONFLICT_RATE")
        fi
        if [[ -n "$OVERRIDE_MAX_LOW_CONF_RATE" ]]; then
          CMD+=(--max-low-confidence-rate "$OVERRIDE_MAX_LOW_CONF_RATE")
        fi

        set +e
        "${CMD[@]}"
        GATE_EXIT_CODE=$?
        set -e

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "summary_json=$SUMMARY_JSON" >> $GITHUB_OUTPUT
        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT
        echo "exit_code=$GATE_EXIT_CODE" >> $GITHUB_OUTPUT
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path(os.environ["GRAPH2D_REVIEW_PACK_GATE_REPORT"]).read_text(encoding="utf-8"))
        metrics = payload.get("metrics") or {}
        failures = payload.get("failures") if isinstance(payload.get("failures"), list) else []
        warnings = payload.get("warnings") if isinstance(payload.get("warnings"), list) else []
        first_failure = str(failures[0]).replace("\n", " ").replace("\r", " ").strip() if failures else ""
        first_warning = str(warnings[0]).replace("\n", " ").replace("\r", " ").strip() if warnings else ""
        headline = "passed"
        if payload.get("status") != "passed":
            headline = f"failed: {first_failure or 'unknown reason'}"
        elif first_warning:
            headline = f"passed_with_warning: {first_warning}"
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"status={payload.get('status', 'unknown')}\n")
            f.write(f"candidate_rate={metrics.get('candidate_rate', 0)}\n")
            f.write(f"hybrid_rejected_rate={metrics.get('hybrid_rejected_rate', 0)}\n")
            f.write(f"conflict_rate={metrics.get('conflict_rate', 0)}\n")
            f.write(f"low_confidence_rate={metrics.get('low_confidence_rate', 0)}\n")
            f.write(f"failure_count={len(failures)}\n")
            f.write(f"warning_count={len(warnings)}\n")
            f.write(f"first_failure={first_failure}\n")
            f.write(f"first_warning={first_warning}\n")
            f.write(f"headline={headline}\n")
        PY

    - name: Emit Graph2D review gate annotations (optional)
      if: steps.graph2d_review_gate.outputs.enabled == 'true'
      continue-on-error: true
      run: |
        REPORT="${{ steps.graph2d_review_gate.outputs.report_path }}"
        if [[ -z "$REPORT" || ! -f "$REPORT" ]]; then
          echo "No review gate report found; skip annotations."
          exit 0
        fi
        python3 scripts/ci/emit_graph2d_review_pack_gate_annotations.py \
          --report-json "$REPORT"

    - name: Evaluate Graph2D review gate strict mode (optional)
      id: graph2d_review_gate_strict
      if: steps.graph2d_review_gate.outputs.enabled == 'true'
      continue-on-error: true
      run: |
        STRICT_OVERRIDE="${{ env.REVIEW_GATE_STRICT || '' }}"
        STRICT_VALUE="${GRAPH2D_REVIEW_PACK_GATE_STRICT:-false}"
        if [[ -n "$STRICT_OVERRIDE" ]]; then
          STRICT_VALUE="$STRICT_OVERRIDE"
        fi
        token="$(echo "$STRICT_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_strict="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_strict="true"
        fi
        gate_status="${{ steps.graph2d_review_gate.outputs.status }}"
        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "strict_mode=$is_strict" >> $GITHUB_OUTPUT
        echo "gate_status=$gate_status" >> $GITHUB_OUTPUT
        if [[ "$is_strict" != "true" ]]; then
          echo "should_fail=false" >> $GITHUB_OUTPUT
          echo "reason=strict_mode_disabled" >> $GITHUB_OUTPUT
          echo "Graph2D review gate strict mode disabled."
          exit 0
        fi
        if [[ "$gate_status" != "passed" ]]; then
          echo "should_fail=true" >> $GITHUB_OUTPUT
          echo "reason=gate_failed_under_strict_mode" >> $GITHUB_OUTPUT
          echo "Graph2D review gate strict mode enabled and gate status is not passed."
          exit 0
        fi
        echo "should_fail=false" >> $GITHUB_OUTPUT
        echo "reason=gate_passed_under_strict_mode" >> $GITHUB_OUTPUT
        echo "Graph2D review gate strict mode enabled and gate passed."

    - name: Check Hybrid superpass gate (optional)
      id: hybrid_superpass_gate
      if: always()
      continue-on-error: true
      run: |
        ENABLE_OVERRIDE="${{ env.HYBRID_SUPERPASS_ENABLE || '' }}"
        ENABLE_VALUE="${HYBRID_SUPERPASS_ENABLE:-false}"
        if [[ -n "$ENABLE_OVERRIDE" ]]; then
          ENABLE_VALUE="$ENABLE_OVERRIDE"
        fi
        token="$(echo "$ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_enabled="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_enabled="true"
        fi
        if [[ "$is_enabled" != "true" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "status=skipped" >> $GITHUB_OUTPUT
          echo "headline=disabled" >> $GITHUB_OUTPUT
          echo "exit_code=0" >> $GITHUB_OUTPUT
          echo "report_path=" >> $GITHUB_OUTPUT
          echo "missing_mode=${HYBRID_SUPERPASS_MISSING_MODE:-skip}" >> $GITHUB_OUTPUT
          echo "Hybrid superpass gate disabled."
          exit 0
        fi

        REPORT_PATH="${HYBRID_SUPERPASS_OUTPUT_JSON:-reports/history_sequence_eval/hybrid_superpass_report.json}"
        mkdir -p "$(dirname "$REPORT_PATH")"
        GATE_JSON="${HYBRID_SUPERPASS_GATE_REPORT_JSON:-reports/history_sequence_eval/hybrid_blind_gate_report.json}"
        CALIBRATION_JSON="${HYBRID_SUPERPASS_CALIBRATION_JSON:-models/calibration/hybrid_confidence_calibration.json}"
        MISSING_OVERRIDE="${{ env.HYBRID_SUPERPASS_MISSING_MODE || '' }}"
        MISSING_MODE="${HYBRID_SUPERPASS_MISSING_MODE:-skip}"
        if [[ -n "$MISSING_OVERRIDE" ]]; then
          MISSING_MODE="$MISSING_OVERRIDE"
        fi

        set +e
        python3 scripts/ci/check_hybrid_superpass_targets.py \
          --hybrid-blind-gate-report "$GATE_JSON" \
          --hybrid-calibration-json "$CALIBRATION_JSON" \
          --config "${HYBRID_SUPERPASS_CONFIG:-config/hybrid_superpass_targets.yaml}" \
          --missing-mode "$MISSING_MODE" \
          --output "$REPORT_PATH"
        GATE_EXIT_CODE=$?
        set -e

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT
        echo "exit_code=$GATE_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "missing_mode=$MISSING_MODE" >> $GITHUB_OUTPUT
        export HYBRID_SUPERPASS_REPORT="$REPORT_PATH"
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path(os.environ["HYBRID_SUPERPASS_REPORT"]).read_text(encoding="utf-8"))
        failures = payload.get("failures") if isinstance(payload.get("failures"), list) else []
        warnings = payload.get("warnings") if isinstance(payload.get("warnings"), list) else []
        first_failure = str(failures[0]).replace("\n", " ").replace("\r", " ").strip() if failures else ""
        first_warning = str(warnings[0]).replace("\n", " ").replace("\r", " ").strip() if warnings else ""
        headline = "passed"
        if payload.get("status") != "passed":
            headline = f"failed: {first_failure or 'unknown reason'}"
        elif first_warning:
            headline = f"passed_with_warning: {first_warning}"
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"status={payload.get('status', 'unknown')}\n")
            f.write(f"headline={headline}\n")
            f.write(f"failure_count={len(failures)}\n")
            f.write(f"warning_count={len(warnings)}\n")
            f.write(f"first_failure={first_failure}\n")
            f.write(f"first_warning={first_warning}\n")
        PY

    - name: Evaluate Hybrid superpass strict mode (optional)
      id: hybrid_superpass_gate_strict
      if: steps.hybrid_superpass_gate.outputs.enabled == 'true'
      continue-on-error: true
      run: |
        STRICT_OVERRIDE="${{ env.HYBRID_SUPERPASS_FAIL_ON_FAILED || '' }}"
        STRICT_VALUE="${HYBRID_SUPERPASS_FAIL_ON_FAILED:-false}"
        if [[ -n "$STRICT_OVERRIDE" ]]; then
          STRICT_VALUE="$STRICT_OVERRIDE"
        fi
        token="$(echo "$STRICT_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_strict="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_strict="true"
        fi
        gate_status="${{ steps.hybrid_superpass_gate.outputs.status }}"
        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "strict_mode=$is_strict" >> $GITHUB_OUTPUT
        echo "gate_status=$gate_status" >> $GITHUB_OUTPUT
        if [[ "$is_strict" != "true" ]]; then
          echo "should_fail=false" >> $GITHUB_OUTPUT
          echo "reason=strict_mode_disabled" >> $GITHUB_OUTPUT
          echo "Hybrid superpass strict mode disabled."
          exit 0
        fi
        if [[ "$gate_status" != "passed" ]]; then
          echo "should_fail=true" >> $GITHUB_OUTPUT
          echo "reason=superpass_failed_under_strict_mode" >> $GITHUB_OUTPUT
          echo "Hybrid superpass strict mode enabled and status is not passed."
          exit 0
        fi
        echo "should_fail=false" >> $GITHUB_OUTPUT
        echo "reason=superpass_passed_under_strict_mode" >> $GITHUB_OUTPUT
        echo "Hybrid superpass strict mode enabled and status passed."

    - name: Validate Hybrid superpass report structure (optional)
      id: hybrid_superpass_validate
      if: steps.hybrid_superpass_gate.outputs.enabled == 'true'
      continue-on-error: true
      run: |
        REPORT_PATH="${{ steps.hybrid_superpass_gate.outputs.report_path }}"
        if [[ -z "$REPORT_PATH" || ! -f "$REPORT_PATH" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "status=skipped_missing_superpass_report" >> $GITHUB_OUTPUT
          echo "warning_count=1" >> $GITHUB_OUTPUT
          echo "error_count=0" >> $GITHUB_OUTPUT
          echo "report_path=" >> $GITHUB_OUTPUT
          echo "Hybrid superpass report missing; skip structural validation."
          exit 0
        fi

        VALIDATION_JSON="${HYBRID_SUPERPASS_VALIDATION_JSON:-reports/history_sequence_eval/hybrid_superpass_validation.json}"
        mkdir -p "$(dirname "$VALIDATION_JSON")"

        GATE_JSON="${HYBRID_SUPERPASS_GATE_REPORT_JSON:-reports/history_sequence_eval/hybrid_blind_gate_report.json}"
        CALIBRATION_JSON="${HYBRID_SUPERPASS_CALIBRATION_JSON:-models/calibration/hybrid_confidence_calibration.json}"

        STRICT_MODE="${{ steps.hybrid_superpass_gate_strict.outputs.strict_mode || 'false' }}"
        VALIDATION_STRICT_VALUE="${HYBRID_SUPERPASS_VALIDATION_STRICT:-$STRICT_MODE}"
        token="$(echo "$VALIDATION_STRICT_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        validation_strict="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          validation_strict="true"
        fi
        validation_schema_mode="${HYBRID_SUPERPASS_VALIDATION_SCHEMA_MODE:-builtin}"
        schema_token="$(echo "$validation_schema_mode" | tr '[:upper:]' '[:lower:]' | xargs)"
        if [[ "$schema_token" != "off" && "$schema_token" != "builtin" ]]; then
          schema_token="builtin"
        fi
        args=(
          python3 scripts/ci/validate_hybrid_superpass_reports.py
          --superpass-json "$REPORT_PATH"
          --output-json "$VALIDATION_JSON"
          --schema-mode "$schema_token"
        )
        if [[ -n "$GATE_JSON" ]]; then
          args+=(--hybrid-blind-gate-report "$GATE_JSON")
        fi
        if [[ -n "$CALIBRATION_JSON" ]]; then
          args+=(--hybrid-calibration-json "$CALIBRATION_JSON")
        fi
        if [[ "$validation_strict" == "true" ]]; then
          args+=(--strict)
        fi

        set +e
        "${args[@]}"
        VALIDATE_EXIT_CODE=$?
        set -e

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "exit_code=$VALIDATE_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "report_path=$VALIDATION_JSON" >> $GITHUB_OUTPUT
        echo "strict_mode=$validation_strict" >> $GITHUB_OUTPUT
        echo "schema_mode=$schema_token" >> $GITHUB_OUTPUT
        if [[ ! -f "$VALIDATION_JSON" ]]; then
          echo "status=missing_output" >> $GITHUB_OUTPUT
          echo "warning_count=0" >> $GITHUB_OUTPUT
          echo "error_count=1" >> $GITHUB_OUTPUT
          exit 0
        fi

        export HYBRID_SUPERPASS_VALIDATION_REPORT="$VALIDATION_JSON"
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(
            Path(os.environ["HYBRID_SUPERPASS_VALIDATION_REPORT"]).read_text(encoding="utf-8")
        )
        status = str(payload.get("status", "unknown"))
        warnings = payload.get("warnings") if isinstance(payload.get("warnings"), list) else []
        errors = payload.get("errors") if isinstance(payload.get("errors"), list) else []
        if status == "error":
            headline = f"error: {str(errors[0]).strip() if errors else 'unknown'}"
        elif status == "warn":
            headline = f"warn: {str(warnings[0]).strip() if warnings else 'warning'}"
        else:
            headline = "ok"
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"status={status}\n")
            f.write(f"warning_count={len(warnings)}\n")
            f.write(f"error_count={len(errors)}\n")
            f.write(f"headline={headline}\n")
        PY

    - name: Resolve strict gate fail mode
      id: strict_fail_mode
      run: |
        MODE_VALUE="${EVALUATION_STRICT_FAIL_MODE:-hard}"
        token="$(echo "$MODE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        mode="hard"
        if [[ "$token" == "soft" || "$token" == "warn" || "$token" == "warning" || "$token" == "nonblocking" || "$token" == "non-blocking" ]]; then
          mode="soft"
        fi
        echo "mode=$mode" >> $GITHUB_OUTPUT
        echo "mode_raw=$MODE_VALUE" >> $GITHUB_OUTPUT
        echo "Resolved strict fail mode: $mode (raw=$MODE_VALUE)"

    - name: Emit strict gate warning in soft mode
      if: steps.strict_fail_mode.outputs.mode == 'soft' && (steps.graph2d_review_gate_strict.outputs.should_fail == 'true' || steps.hybrid_superpass_gate_strict.outputs.should_fail == 'true' || (steps.hybrid_superpass_validate.outputs.strict_mode == 'true' && steps.hybrid_superpass_validate.outputs.exit_code != '0'))
      run: |
        echo "Strict fail mode is soft; blocking fail steps are downgraded to warning."
        echo "::warning title=Strict Gate Soft Mode::One or more strict gates requested failure, but EVALUATION_STRICT_FAIL_MODE=soft downgraded to warning."
        {
          echo ""
          echo "## Strict Gate Soft Mode"
          echo "- mode: soft"
          echo "- graph2d_review_gate_should_fail: ${{ steps.graph2d_review_gate_strict.outputs.should_fail || 'false' }}"
          echo "- hybrid_superpass_gate_should_fail: ${{ steps.hybrid_superpass_gate_strict.outputs.should_fail || 'false' }}"
          echo "- hybrid_superpass_validate_strict_mode: ${{ steps.hybrid_superpass_validate.outputs.strict_mode || 'false' }}"
          echo "- hybrid_superpass_validate_exit_code: ${{ steps.hybrid_superpass_validate.outputs.exit_code || '0' }}"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Fail workflow when Hybrid superpass strict check requires blocking
      if: steps.hybrid_superpass_gate_strict.outputs.should_fail == 'true' && steps.strict_fail_mode.outputs.mode != 'soft'
      run: |
        echo "Hybrid superpass strict-mode check requested failure."
        echo "Failure reason: ${{ steps.hybrid_superpass_gate_strict.outputs.reason }}"
        exit 1

    - name: Fail workflow when Hybrid superpass structure validation requires blocking
      if: steps.hybrid_superpass_validate.outputs.strict_mode == 'true' && steps.hybrid_superpass_validate.outputs.exit_code != '0' && steps.strict_fail_mode.outputs.mode != 'soft'
      run: |
        echo "Hybrid superpass structure validation failed in strict mode."
        echo "Validation status: ${{ steps.hybrid_superpass_validate.outputs.status }}"
        echo "Validation headline: ${{ steps.hybrid_superpass_validate.outputs.headline || 'n/a' }}"
        exit 1

    - name: Refresh eval reporting stack
      id: eval_reporting_refresh
      continue-on-error: true
      run: |
        set +e
        python3 scripts/ci/refresh_eval_reporting_stack.py \
          --eval-history-dir reports/eval_history \
          --days ${{ env.EVAL_REPORTING_REFRESH_DAYS }}
        REFRESH_RC=$?
        echo "exit_code=$REFRESH_RC" >> $GITHUB_OUTPUT
        exit $REFRESH_RC

    - name: Download Chart.js for integrity check
      run: |
        # Download Chart.js from CDN to local path for integrity verification
        mkdir -p ${{ env.REPORT_PATH }}/assets
        curl -sL "https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" \
          -o ${{ env.REPORT_PATH }}/assets/chart.min.js

    - name: Check file integrity (strict mode)
      run: |
        echo "Checking Chart.js integrity..."
        # Run in strict mode since we're in CI environment
        python3 scripts/check_integrity.py --strict --verbose
        echo "Integrity check passed"

    - name: Validate history with JSON Schema
      run: |
        echo "Validating evaluation history against schema..."
        # With jsonschema installed, this will perform full validation
        python3 scripts/validate_eval_history.py \
          --dir reports/eval_history \
          --summary \
          --exclude-glob hybrid_blind_drift_alert_report.json \
          --exclude-glob hybrid_blind_drift_threshold_suggestion.json
        echo "Schema validation passed"

    - name: Generate insights and detect anomalies
      id: insights
      run: |
        echo "Analyzing evaluation trends and anomalies..."
        python3 scripts/analyze_eval_insights.py --days 30 --output reports/insights.md

        # Check for anomalies
        if python3 scripts/analyze_eval_insights.py --days 7 --threshold 0.1 --narrative-only | grep -q "Anomalies Detected"; then
          echo "has_anomalies=true" >> $GITHUB_OUTPUT
          echo "Anomalies detected in recent evaluations"
        else
          echo "has_anomalies=false" >> $GITHUB_OUTPUT
          echo "No anomalies detected"
        fi

    - name: Export metrics for monitoring
      run: |
        echo "Exporting metrics in multiple formats..."
        python3 scripts/export_eval_metrics.py --format prometheus --output reports/metrics.prom
        python3 scripts/export_eval_metrics.py --format json --output reports/metrics.json
        echo "Metrics exported"

    - name: Security audit
      id: security
      continue-on-error: true
      run: |
        echo "Running security audit..."
        if python3 scripts/security_audit.py --severity medium --json > reports/security_audit.json 2>&1; then
          echo "security_status=pass" >> $GITHUB_OUTPUT
          echo "Security audit passed"
        else
          echo "security_status=fail" >> $GITHUB_OUTPUT
          echo "Security issues found (non-blocking)"
        fi

    - name: Upload evaluation report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: evaluation-report-${{ github.run_number }}
        path: ${{ env.REPORT_PATH }}
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload interactive report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: evaluation-interactive-report-${{ github.run_number }}
        path: ${{ env.INTERACTIVE_REPORT_PATH }}
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload eval reporting stack artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: eval-reporting-stack-${{ github.run_number }}
        path: |
          ${{ env.EVAL_REPORTING_BUNDLE_JSON }}
          reports/eval_history/eval_reporting_bundle.md
          ${{ env.EVAL_REPORTING_BUNDLE_HEALTH_JSON }}
          reports/eval_history/eval_reporting_bundle_health_report.md
          ${{ env.EVAL_REPORTING_INDEX_JSON }}
          reports/eval_history/eval_reporting_index.md
          reports/eval_history/index.html
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload landing page
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: eval-reporting-landing-${{ github.run_number }}
        path: reports/eval_history/index.html
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Assemble Pages-ready root

        GITHUB_EVENT_INPUTS_JSON: ${{ toJson(github.event.inputs) }}
        GITHUB_STEPS_JSON: ${{ toJson(steps) }}
      run: |
        bash scripts/ci/create_evaluation_job_summary.sh

    - name: Comment PR with results
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
      env:
        GITHUB_EVENT_INPUTS_JSON: ${{ toJson(github.event.inputs) }}
        GITHUB_STEPS_JSON: ${{ toJson(steps) }}
        EVAL_REPORTING_STACK_SUMMARY_JSON_FOR_COMMENT: reports/ci/eval_reporting_stack_summary.json
        EVAL_REPORTING_INDEX_JSON_FOR_COMMENT: reports/eval_history/eval_reporting_index.json
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { commentEvaluationReportPR } = require('./scripts/ci/comment_evaluation_report_pr.js');
          await commentEvaluationReportPR({ github, context, core, process });

    - name: Fail workflow when Hybrid superpass strict check requires blocking
      if: steps.hybrid_superpass_gate_strict.outputs.should_fail == 'true'
      run: |
        echo "Hybrid superpass strict-mode check requested failure."
        echo "Failure reason: ${{ steps.hybrid_superpass_gate_strict.outputs.reason }}"
        exit 1

    - name: Fail workflow when Graph2D review gate strict check requires blocking
      if: steps.graph2d_review_gate_strict.outputs.should_fail == 'true'
      run: |
        echo "Graph2D review gate strict mode is enabled and gate status is '${{ steps.graph2d_review_gate_strict.outputs.gate_status }}'."
        echo "Failure reason: ${{ steps.graph2d_review_gate_strict.outputs.reason }}"
        exit 1

  deploy-pages:
    name: Deploy Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: evaluate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Pages deployment is optional - don't fail workflow if Pages not enabled
    continue-on-error: true

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Download Pages-ready artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: eval-reporting-pages-${{ github.run_number }}
        path: ./public

    - name: Setup Pages
      uses: actions/configure-pages@v4
      continue-on-error: true

    - name: Upload to Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e

    - name: Checkout for public index generation
      if: always()
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        sparse-checkout: |
          scripts/ci/generate_eval_reporting_public_index.py
          scripts/ci/generate_eval_reporting_dashboard_payload.py
          scripts/ci/post_eval_reporting_release_draft_publish.js
          scripts/ci/generate_eval_reporting_webhook_delivery_request.py
          scripts/ci/post_eval_reporting_webhook_delivery.js
          scripts/eval_report_data_helpers.py

    - name: Download stack summary for public index
      if: always()
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: eval-reporting-stack-${{ github.run_number }}
        path: ./stack-artifacts
      continue-on-error: true

    - name: Download stack summary JSON for public index
      if: always()
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: eval-reporting-stack-summary-${{ github.run_number }}
        path: ./summary-artifacts
      continue-on-error: true

    - name: Generate public discovery index
      if: always()
      run: |
        python3 scripts/ci/generate_eval_reporting_public_index.py \
          --page-url "${{ steps.deployment.outputs.page_url || '' }}" \
          --index-json ./stack-artifacts/eval_reporting_index.json \
          --stack-summary-json ./summary-artifacts/eval_reporting_stack_summary.json \
          --output-json reports/ci/eval_reporting_public_index.json \
          --output-md reports/ci/eval_reporting_public_index.md
      continue-on-error: true

    - name: Download release summary for dashboard payload
      if: always()
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: eval-reporting-release-summary-${{ github.run_number }}
        path: ./release-summary-artifacts
      continue-on-error: true

    - name: Generate eval reporting dashboard payload
      if: always()
      run: |
        python3 scripts/ci/generate_eval_reporting_dashboard_payload.py \
          --release-summary-json ./release-summary-artifacts/eval_reporting_release_summary.json \
          --public-index-json reports/ci/eval_reporting_public_index.json \
          --output-json reports/ci/eval_reporting_dashboard_payload.json \
          --output-md reports/ci/eval_reporting_dashboard_payload.md
      continue-on-error: true

    - name: Generate eval reporting webhook delivery request
      if: always()
      run: |
        python3 scripts/ci/generate_eval_reporting_webhook_delivery_request.py \
          --dashboard-payload-json reports/ci/eval_reporting_dashboard_payload.json \
          --output-json reports/ci/eval_reporting_webhook_delivery_request.json \
          --output-md reports/ci/eval_reporting_webhook_delivery_request.md
      continue-on-error: true

    - name: Generate eval reporting webhook delivery result
      if: always()
      uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
      continue-on-error: true
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { postWebhookDelivery } = require('./scripts/ci/post_eval_reporting_webhook_delivery.js');
          await postWebhookDelivery({
            deliveryRequestPath: 'reports/ci/eval_reporting_webhook_delivery_request.json',
            deliveryEnabled: false,
            webhookUrl: '',
            outputJsonPath: 'reports/ci/eval_reporting_webhook_delivery_result.json',
            outputMdPath: 'reports/ci/eval_reporting_webhook_delivery_result.md',
          });

    - name: Generate eval reporting release draft publish result
      if: always()
      uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
      continue-on-error: true
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { postReleaseDraftPublish } = require('./scripts/ci/post_eval_reporting_release_draft_publish.js');
          await postReleaseDraftPublish({
            github,
            context,
            dashboardPayloadPath: 'reports/ci/eval_reporting_dashboard_payload.json',
            publishEnabled: false,
            outputJsonPath: 'reports/ci/eval_reporting_release_draft_publish_result.json',
            outputMdPath: 'reports/ci/eval_reporting_release_draft_publish_result.md',
          });

    - name: Consolidated eval reporting deploy-pages summary
      if: always()
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Eval Reporting Deploy-Pages Summary" >> $GITHUB_STEP_SUMMARY

        append_section() {
          local title="$1" md="$2"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### $title" >> $GITHUB_STEP_SUMMARY
          if [[ -f "$md" ]]; then
            cat "$md" >> $GITHUB_STEP_SUMMARY
          else
            echo "- $title not available" >> $GITHUB_STEP_SUMMARY
          fi
        }

        append_section "Public URLs" "reports/ci/eval_reporting_public_index.md"
        append_section "Dashboard Payload" "reports/ci/eval_reporting_dashboard_payload.md"
        append_section "Webhook Delivery Request" "reports/ci/eval_reporting_webhook_delivery_request.md"
        append_section "Webhook Delivery Result" "reports/ci/eval_reporting_webhook_delivery_result.md"
        append_section "Release Draft Publish Result" "reports/ci/eval_reporting_release_draft_publish_result.md"
      continue-on-error: true

    - name: Upload public discovery index
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: eval-reporting-public-index-${{ github.run_number }}
        path: |
          reports/ci/eval_reporting_public_index.json
          reports/ci/eval_reporting_public_index.md
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload eval reporting dashboard payload
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: eval-reporting-dashboard-payload-${{ github.run_number }}
        path: |
          reports/ci/eval_reporting_dashboard_payload.json
          reports/ci/eval_reporting_dashboard_payload.md
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload eval reporting webhook delivery request
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: eval-reporting-webhook-delivery-request-${{ github.run_number }}
        path: |
          reports/ci/eval_reporting_webhook_delivery_request.json
          reports/ci/eval_reporting_webhook_delivery_request.md
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload eval reporting webhook delivery result
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: eval-reporting-webhook-delivery-result-${{ github.run_number }}
        path: |
          reports/ci/eval_reporting_webhook_delivery_result.json
          reports/ci/eval_reporting_webhook_delivery_result.md
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

    - name: Upload eval reporting release draft publish result
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: eval-reporting-release-draft-publish-result-${{ github.run_number }}
        path: |
          reports/ci/eval_reporting_release_draft_publish_result.json
          reports/ci/eval_reporting_release_draft_publish_result.md
        if-no-files-found: ignore
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

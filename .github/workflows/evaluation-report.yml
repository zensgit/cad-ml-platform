        echo "output_csv=$OUTPUT_CSV" >> $GITHUB_OUTPUT
        echo "output_json=$OUTPUT_JSON" >> $GITHUB_OUTPUT
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(
            Path(os.environ["ACTIVE_LEARNING_REVIEW_QUEUE_REPORT_OUTPUT_JSON"]).read_text(
                encoding="utf-8"
            )
        )

        def compact_named(items, limit=5):
            out = []
            for item in (items or [])[:limit]:
                if not isinstance(item, dict):
                    continue
                name = str(item.get("name") or "").strip()
                count = item.get("count")
                if name:
                    out.append(f"{name}({count})")
            return "; ".join(out)

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"total={payload.get('total', 0)}\n")
            f.write(f"operational_status={payload.get('operational_status', 'unknown')}\n")
            f.write(f"critical_count={payload.get('critical_count', 0)}\n")

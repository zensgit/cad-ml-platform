        if [[ -n "$ENABLE_OVERRIDE" ]]; then
          ENABLE_VALUE="$ENABLE_OVERRIDE"
        fi
        ENABLE_TOKEN="$(echo "$ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"

        OUTPUT_JSON="${BENCHMARK_COMPANION_SUMMARY_OUTPUT_JSON:-reports/history_sequence_eval/benchmark_companion_summary.json}"

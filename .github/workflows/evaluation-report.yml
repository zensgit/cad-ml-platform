            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "BENCHMARK_COMPANION_SUMMARY_ENABLE is not true and no inputs found; skip."
            exit 0
          fi
        fi

        if [[ "$INPUT_COUNT" -eq 0 ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "No benchmark companion summary inputs found; skip."
          exit 0

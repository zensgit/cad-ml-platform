jobs:
  evaluate:
    name: Run Evaluation and Generate Report
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for git info

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        # Install optional dependencies for enhanced validation
        pip install jsonschema==4.21.1

    - name: Run combined evaluation
      id: evaluation
      run: |
        # Use workflow inputs if provided, otherwise use defaults
        MIN_COMBINED="${{ github.event.inputs.min_combined || '0.8' }}"
        MIN_VISION="${{ github.event.inputs.min_vision || '0.65' }}"
        MIN_OCR="${{ github.event.inputs.min_ocr || '0.9' }}"

        echo "Running evaluation with thresholds:"
        echo "  Combined: $MIN_COMBINED"
        echo "  Vision: $MIN_VISION"
        echo "  OCR: $MIN_OCR"

        # Run evaluation and save history
        python3 scripts/evaluate_vision_ocr_combined.py \
          --save-history \
          --min-combined $MIN_COMBINED \
          --min-vision $MIN_VISION \
          --min-ocr $MIN_OCR | tee eval_output.txt

        # Extract scores for job summary
        echo "combined_score=$(grep -oP 'Combined Score: \K[0-9.]+' eval_output.txt || echo '0')" >> $GITHUB_OUTPUT
        echo "vision_score=$(grep -oP 'Vision Score: \K[0-9.]+' eval_output.txt || echo '0')" >> $GITHUB_OUTPUT
        echo "ocr_score=$(grep -oP 'OCR Score: \K[0-9.]+' eval_output.txt || echo '0')" >> $GITHUB_OUTPUT

    - name: Run history-sequence evaluation (optional)
      id: history_eval
      continue-on-error: true
      run: |
        mkdir -p reports/history_sequence_eval
        MANIFEST="${HISTORY_SEQUENCE_EVAL_MANIFEST:-}"
        H5_DIR="${HISTORY_SEQUENCE_EVAL_H5_DIR:-}"
        if [[ -z "$MANIFEST" && -z "$H5_DIR" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "No history-sequence dataset configured; skip."
          exit 0
        fi

        LABEL_SOURCE="manifest"
        if [[ -z "$MANIFEST" ]]; then
          LABEL_SOURCE="filename"
        fi

        BUILD_CMD=(
          python3 scripts/build_history_sequence_prototypes.py
          --label-source "$LABEL_SOURCE"
          --output reports/history_sequence_eval/prototypes.json
          --filename-min-conf "${HISTORY_SEQUENCE_FILENAME_MIN_CONF:-0.8}"
        )
        if [[ -n "$MANIFEST" ]]; then
          BUILD_CMD+=(--manifest "$MANIFEST")
        fi
        if [[ -n "$H5_DIR" ]]; then
          BUILD_CMD+=(--h5-dir "$H5_DIR")
        fi
        "${BUILD_CMD[@]}"

        TOKEN_WEIGHT="${HISTORY_SEQUENCE_PROTOTYPE_TOKEN_WEIGHT:-1.0}"
        BIGRAM_WEIGHT="${HISTORY_SEQUENCE_PROTOTYPE_BIGRAM_WEIGHT:-1.0}"
        WEIGHT_SOURCE="configured"
        TUNE_BEST_CONFIG=""
        if [[ "${HISTORY_SEQUENCE_TUNE_ENABLE:-false}" == "true" ]]; then
          TUNE_CMD=(
            python3 scripts/tune_history_sequence_weights.py
            --label-source "$LABEL_SOURCE"
            --prototypes-path reports/history_sequence_eval/prototypes.json
            --output-dir reports/history_sequence_eval/tuning
            --objective "${HISTORY_SEQUENCE_TUNE_OBJECTIVE:-macro_f1_overall}"
            --token-weight-grid "${HISTORY_SEQUENCE_TUNE_TOKEN_WEIGHT_GRID:-0.5,1.0,1.5}"
            --bigram-weight-grid "${HISTORY_SEQUENCE_TUNE_BIGRAM_WEIGHT_GRID:-0.0,0.5,1.0,1.5}"
            --filename-min-conf "${HISTORY_SEQUENCE_FILENAME_MIN_CONF:-0.8}"
          )
          if [[ -n "$MANIFEST" ]]; then
            TUNE_CMD+=(--manifest "$MANIFEST")
          fi
          if [[ -n "$H5_DIR" ]]; then
            TUNE_CMD+=(--h5-dir "$H5_DIR")
          fi
          "${TUNE_CMD[@]}"
          TUNE_BEST_CONFIG="reports/history_sequence_eval/tuning/best_config.json"
          if [[ -f "$TUNE_BEST_CONFIG" ]]; then
            read TOKEN_WEIGHT BIGRAM_WEIGHT < <(python3 -c 'import json; from pathlib import Path; payload=json.loads(Path("reports/history_sequence_eval/tuning/best_config.json").read_text(encoding="utf-8")); best=payload.get("best") or {}; print(best.get("token_weight", 1.0), best.get("bigram_weight", 1.0))')
            WEIGHT_SOURCE="tuned"
          fi
        fi

        RECOMMENDED_ENV="reports/history_sequence_eval/recommended_history_sequence.env"
        cat > "$RECOMMENDED_ENV" <<ENV
        # Auto-generated by evaluation-report.yml
        HISTORY_SEQUENCE_PROTOTYPE_TOKEN_WEIGHT=${TOKEN_WEIGHT}
        HISTORY_SEQUENCE_PROTOTYPE_BIGRAM_WEIGHT=${BIGRAM_WEIGHT}
        HISTORY_SEQUENCE_PROTOTYPES_PATH=reports/history_sequence_eval/prototypes.json
        ENV

        EVAL_CMD=(
          python3 scripts/eval_history_sequence_classifier.py
          --label-source "$LABEL_SOURCE"
          --prototypes-path reports/history_sequence_eval/prototypes.json
          --output-dir reports/history_sequence_eval
          --filename-min-conf "${HISTORY_SEQUENCE_FILENAME_MIN_CONF:-0.8}"
          --prototype-token-weight "$TOKEN_WEIGHT"
          --prototype-bigram-weight "$BIGRAM_WEIGHT"
        )
        if [[ -n "$MANIFEST" ]]; then
          EVAL_CMD+=(--manifest "$MANIFEST")
        fi
        if [[ -n "$H5_DIR" ]]; then
          EVAL_CMD+=(--h5-dir "$H5_DIR")
        fi
        "${EVAL_CMD[@]}"

        SUMMARY_PATH="reports/history_sequence_eval/summary.json"
        if [[ -f "$SUMMARY_PATH" ]]; then
          echo "enabled=true" >> $GITHUB_OUTPUT
          echo "summary_path=$SUMMARY_PATH" >> $GITHUB_OUTPUT
          echo "recommended_env=reports/history_sequence_eval/recommended_history_sequence.env" >> $GITHUB_OUTPUT
          echo "selected_token_weight=$TOKEN_WEIGHT" >> $GITHUB_OUTPUT
          echo "selected_bigram_weight=$BIGRAM_WEIGHT" >> $GITHUB_OUTPUT
          echo "weight_source=$WEIGHT_SOURCE" >> $GITHUB_OUTPUT
          echo "tune_objective=${HISTORY_SEQUENCE_TUNE_OBJECTIVE:-macro_f1_overall}" >> $GITHUB_OUTPUT
          python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path("reports/history_sequence_eval/summary.json").read_text(encoding="utf-8"))
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"coverage={payload.get('coverage', 0)}\n")
            f.write(f"accuracy_overall={payload.get('accuracy_overall', 0)}\n")
            f.write(f"macro_f1_overall={payload.get('macro_f1_overall', 0)}\n")
        PY
        else
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "History-sequence summary not found; skip artifact."
        fi

    - name: Validate evaluation history
      run: |
        python3 scripts/validate_eval_history.py --dir reports/eval_history

    - name: Check Graph2D blind gate (optional)
      id: graph2d_blind_gate
      run: |
        SUMMARY_PATH="${GRAPH2D_BLIND_SUMMARY_JSON:-}"
        if [[ -z "$SUMMARY_PATH" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "No GRAPH2D_BLIND_SUMMARY_JSON configured; skip."
          exit 0
        fi
        if [[ ! -f "$SUMMARY_PATH" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Graph2D blind summary not found: $SUMMARY_PATH"
          exit 0
        fi

        REPORT_PATH="reports/history_sequence_eval/graph2d_blind_gate_report.json"

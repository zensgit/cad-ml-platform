          echo "- History coverage: ${{ steps.history_eval.outputs.coverage }}" >> $GITHUB_STEP_SUMMARY
          echo "- History accuracy(overall): ${{ steps.history_eval.outputs.accuracy_overall }}" >> $GITHUB_STEP_SUMMARY
          echo "- History macro-F1(overall): ${{ steps.history_eval.outputs.macro_f1_overall }}" >> $GITHUB_STEP_SUMMARY
          echo "- History selected token weight: ${{ steps.history_eval.outputs.selected_token_weight }}" >> $GITHUB_STEP_SUMMARY
          echo "- History selected bigram weight: ${{ steps.history_eval.outputs.selected_bigram_weight }}" >> $GITHUB_STEP_SUMMARY
          echo "- History weight source: ${{ steps.history_eval.outputs.weight_source }}" >> $GITHUB_STEP_SUMMARY
          echo "- History tune objective: ${{ steps.history_eval.outputs.tune_objective }}" >> $GITHUB_STEP_SUMMARY
          echo "- History recommended env: ${{ steps.history_eval.outputs.recommended_env }}" >> $GITHUB_STEP_SUMMARY

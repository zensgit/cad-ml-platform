name: Action Pin Guard

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
    paths:
      - ".github/workflows/**"
      - "scripts/ci/check_workflow_action_pins.py"
      - "config/workflow_action_pin_policy.json"
      - "tests/unit/test_check_workflow_action_pins.py"
      - "Makefile"
  pull_request:
    # No `paths:` filter: this is a REQUIRED status check, so it must run on EVERY PR to produce the
    # context. A paths filter here permanently BLOCKS docs-only / CODEOWNERS-only PRs (the context is
    # never generated). The guard is a fast FULL SCAN on every PR — a pure-stdlib static sweep of the
    # whole workflow tree, with no changed-files short-circuit (running it directly is simpler and
    # harder to false-green than conditionally skipping it).

permissions:
  contents: read

jobs:
  action-pin-guard:
    name: Action Pin Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Validate workflow action pins
        # The validator is pure standard library: this REQUIRED check must NOT bootstrap packages
        # (no PyPI dependency at check time) — that is a needless failure surface on a gate whose
        # whole value is being dependable. NB the job is not "network-free": Checkout and Setup
        # Python legitimately use the network; the invariant is specifically no package bootstrap.
        # Pinned by construction in tests/unit/test_action_pin_guard_workflow.py by EXACT set equality
        # at every level — workflow keys, jobs, job keys, step list, each step's keys — so a
        # workflow- or job-level `defaults.run.shell`/`env:`, an extra step/job, or a step `shell:`
        # cannot add an execution entry point that smuggles an install back in. Any such addition must
        # be a reviewed decision.
        run: |
          python scripts/ci/check_workflow_action_pins.py \
            --workflows-dir .github/workflows \
            --policy-json config/workflow_action_pin_policy.json \
            --require-policy-for-all-external

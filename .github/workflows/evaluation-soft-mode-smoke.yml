name: Evaluation Soft-Mode Smoke

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref for evaluation-report dispatch"
        required: false
        default: "main"
      expected_conclusion:
        description: "Expected conclusion for dispatched run"
        required: false
        default: "success"
      keep_soft:
        description: "Keep EVALUATION_STRICT_FAIL_MODE=soft after run (true/false)"
        required: false
        default: "false"
      skip_log_check:
        description: "Skip strict-mode soft marker check in run logs (true/false)"
        required: false
        default: "false"
  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: evaluation-soft-mode-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  soft-mode-smoke:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Run evaluation soft-mode smoke dispatcher
        run: |
          set -euo pipefail
          REF_INPUT="${{ github.event.inputs.ref || '' }}"
          if [[ -z "$REF_INPUT" ]]; then
            REF_INPUT="main"
          fi
          EXPECTED_INPUT="${{ github.event.inputs.expected_conclusion || '' }}"
          if [[ -z "$EXPECTED_INPUT" ]]; then
            EXPECTED_INPUT="success"
          fi

          extra_flags=""
          keep_soft_token="$(echo "${{ github.event.inputs.keep_soft || 'false' }}" | tr '[:upper:]' '[:lower:]' | xargs)"
          skip_log_token="$(echo "${{ github.event.inputs.skip_log_check || 'false' }}" | tr '[:upper:]' '[:lower:]' | xargs)"
          if [[ "$keep_soft_token" == "1" || "$keep_soft_token" == "true" || "$keep_soft_token" == "yes" || "$keep_soft_token" == "on" ]]; then
            extra_flags="$extra_flags --keep-soft"
          fi
          if [[ "$skip_log_token" == "1" || "$skip_log_token" == "true" || "$skip_log_token" == "yes" || "$skip_log_token" == "on" ]]; then
            extra_flags="$extra_flags --skip-log-check"
          fi

          mkdir -p reports/ci
          python3 scripts/ci/dispatch_evaluation_soft_mode_smoke.py \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow "evaluation-report.yml" \
            --ref "$REF_INPUT" \
            --expected-conclusion "$EXPECTED_INPUT" \
            --wait-timeout-seconds 1200 \
            --poll-interval-seconds 3 \
            --list-limit 30 \
            --output-json reports/ci/evaluation_soft_mode_smoke_summary.json \
            $extra_flags

      - name: Upload soft-mode smoke summary
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: evaluation-soft-mode-smoke-${{ github.run_number }}
          path: reports/ci/evaluation_soft_mode_smoke_summary.json

      - name: Append summary
        if: always()
        run: |
          echo "## Evaluation Soft-Mode Smoke" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f reports/ci/evaluation_soft_mode_smoke_summary.json ]]; then
            python3 - <<'PY'
            import json
            from pathlib import Path
            payload = json.loads(
                Path("reports/ci/evaluation_soft_mode_smoke_summary.json").read_text(
                    encoding="utf-8"
                )
            )
            print(
                f"- overall_exit_code: {payload.get('overall_exit_code')}"
            )
            dispatch = payload.get("dispatch") or {}
            if isinstance(dispatch, dict):
                run_id = dispatch.get("run_id")
                run_url = dispatch.get("run_url")
                if run_id:
                    print(f"- run_id: {run_id}")
                if run_url:
                    print(f"- run_url: {run_url}")
            print(f"- soft_marker_ok: {payload.get('soft_marker_ok')}")
            print(f"- restore_ok: {payload.get('restore_ok')}")
            PY
          else
            echo "- summary_json missing: reports/ci/evaluation_soft_mode_smoke_summary.json"
          fi >> "$GITHUB_STEP_SUMMARY"

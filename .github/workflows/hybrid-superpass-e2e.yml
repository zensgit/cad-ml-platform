name: Hybrid Superpass E2E
run-name: Hybrid Superpass E2E${{ github.event.inputs.dispatch_trace_id && format(' [{0}]', github.event.inputs.dispatch_trace_id) || '' }}

on:
  workflow_dispatch:
    inputs:
      hybrid_superpass_enable:
        description: 'Enable hybrid superpass target gate (true/false)'
        required: false
        default: 'true'
      hybrid_superpass_missing_mode:
        description: 'Hybrid superpass missing-mode (skip/fail)'
        required: false
        default: 'fail'
      hybrid_superpass_fail_on_failed:
        description: 'Strict fail when superpass gate status is not passed (true/false)'
        required: false
        default: 'true'
      hybrid_blind_gate_report_json:
        description: 'Optional hybrid blind gate report JSON path'
        required: false
        default: ''
      hybrid_calibration_json:
        description: 'Optional hybrid calibration JSON path'
        required: false
        default: ''
      hybrid_superpass_config:
        description: 'Optional superpass config YAML path'
        required: false
        default: 'config/hybrid_superpass_targets.yaml'
      hybrid_superpass_output_json:
        description: 'Optional superpass report output path'
        required: false
        default: 'reports/history_sequence_eval/hybrid_superpass_report.json'
      dispatch_trace_id:
        description: 'Optional trace id for concurrent dispatch correlation'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  superpass:
    name: Run Hybrid Superpass Gate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Hybrid superpass gate
      id: hybrid_superpass_gate
      continue-on-error: true
      run: |
        ENABLE_VALUE="${{ github.event.inputs.hybrid_superpass_enable || 'true' }}"
        token="$(echo "$ENABLE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_enabled="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_enabled="true"
        fi

        if [[ "$is_enabled" != "true" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "status=skipped" >> $GITHUB_OUTPUT
          echo "headline=disabled" >> $GITHUB_OUTPUT
          echo "exit_code=0" >> $GITHUB_OUTPUT
          echo "report_path=" >> $GITHUB_OUTPUT
          echo "missing_mode=${{ github.event.inputs.hybrid_superpass_missing_mode || 'fail' }}" >> $GITHUB_OUTPUT
          exit 0
        fi

        REPORT_PATH="${{ github.event.inputs.hybrid_superpass_output_json || 'reports/history_sequence_eval/hybrid_superpass_report.json' }}"
        mkdir -p "$(dirname "$REPORT_PATH")"
        GATE_JSON="${{ github.event.inputs.hybrid_blind_gate_report_json || '' }}"
        CALIBRATION_JSON="${{ github.event.inputs.hybrid_calibration_json || '' }}"
        MISSING_MODE="${{ github.event.inputs.hybrid_superpass_missing_mode || 'fail' }}"
        CONFIG_PATH="${{ github.event.inputs.hybrid_superpass_config || 'config/hybrid_superpass_targets.yaml' }}"

        CMD=(
          python scripts/ci/check_hybrid_superpass_targets.py
          --config "$CONFIG_PATH"
          --missing-mode "$MISSING_MODE"
          --output "$REPORT_PATH"
        )
        if [[ -n "$GATE_JSON" ]]; then
          CMD+=(--hybrid-blind-gate-report "$GATE_JSON")
        fi
        if [[ -n "$CALIBRATION_JSON" ]]; then
          CMD+=(--hybrid-calibration-json "$CALIBRATION_JSON")
        fi

        set +e
        "${CMD[@]}"
        GATE_EXIT_CODE=$?
        set -e

        echo "enabled=true" >> $GITHUB_OUTPUT
        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT
        echo "exit_code=$GATE_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "missing_mode=$MISSING_MODE" >> $GITHUB_OUTPUT

        export HYBRID_SUPERPASS_REPORT="$REPORT_PATH"
        python - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = json.loads(Path(os.environ["HYBRID_SUPERPASS_REPORT"]).read_text(encoding="utf-8"))
        failures = payload.get("failures") if isinstance(payload.get("failures"), list) else []
        warnings = payload.get("warnings") if isinstance(payload.get("warnings"), list) else []
        first_failure = str(failures[0]).replace("\n", " ").replace("\r", " ").strip() if failures else ""
        first_warning = str(warnings[0]).replace("\n", " ").replace("\r", " ").strip() if warnings else ""
        headline = "passed"
        if payload.get("status") != "passed":
            headline = f"failed: {first_failure or 'unknown reason'}"
        elif first_warning:
            headline = f"passed_with_warning: {first_warning}"
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"status={payload.get('status', 'unknown')}\n")
            f.write(f"headline={headline}\n")
            f.write(f"failure_count={len(failures)}\n")
            f.write(f"warning_count={len(warnings)}\n")
            f.write(f"first_failure={first_failure}\n")
            f.write(f"first_warning={first_warning}\n")
        PY

    - name: Evaluate Hybrid superpass strict mode
      id: hybrid_superpass_gate_strict
      if: steps.hybrid_superpass_gate.outputs.enabled == 'true'
      run: |
        STRICT_VALUE="${{ github.event.inputs.hybrid_superpass_fail_on_failed || 'true' }}"
        token="$(echo "$STRICT_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
        is_strict="false"
        if [[ "$token" == "1" || "$token" == "true" || "$token" == "yes" || "$token" == "on" ]]; then
          is_strict="true"
        fi
        gate_status="${{ steps.hybrid_superpass_gate.outputs.status }}"
        echo "strict_mode=$is_strict" >> $GITHUB_OUTPUT
        echo "gate_status=$gate_status" >> $GITHUB_OUTPUT
        if [[ "$is_strict" != "true" ]]; then
          echo "should_fail=false" >> $GITHUB_OUTPUT
          echo "reason=strict_mode_disabled" >> $GITHUB_OUTPUT
          exit 0
        fi
        if [[ "$gate_status" != "passed" ]]; then
          echo "should_fail=true" >> $GITHUB_OUTPUT
          echo "reason=superpass_failed_under_strict_mode" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "should_fail=false" >> $GITHUB_OUTPUT
        echo "reason=superpass_passed_under_strict_mode" >> $GITHUB_OUTPUT

    - name: Fail workflow when Hybrid superpass strict check requires blocking
      if: steps.hybrid_superpass_gate_strict.outputs.should_fail == 'true'
      run: |
        echo "Hybrid superpass strict-mode check requested failure."
        echo "Failure reason: ${{ steps.hybrid_superpass_gate_strict.outputs.reason }}"
        exit 1

    - name: Upload Hybrid superpass gate artifact
      if: steps.hybrid_superpass_gate.outputs.enabled == 'true'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: hybrid-superpass-gate-${{ github.run_number }}
        path: ${{ steps.hybrid_superpass_gate.outputs.report_path }}
        retention-days: 30

    - name: Create job summary
      run: |
        echo "# Hybrid Superpass E2E" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ steps.hybrid_superpass_gate.outputs.enabled }}" == "true" ]]; then
          echo "- Gate status: ${{ steps.hybrid_superpass_gate.outputs.status }} (exit=${{ steps.hybrid_superpass_gate.outputs.exit_code }})" >> $GITHUB_STEP_SUMMARY
          echo "- Headline: ${{ steps.hybrid_superpass_gate.outputs.headline }}" >> $GITHUB_STEP_SUMMARY
          echo "- Report: ${{ steps.hybrid_superpass_gate.outputs.report_path }}" >> $GITHUB_STEP_SUMMARY
          echo "- Missing mode: ${{ steps.hybrid_superpass_gate.outputs.missing_mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- Strict mode: ${{ steps.hybrid_superpass_gate_strict.outputs.strict_mode || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Strict should fail: ${{ steps.hybrid_superpass_gate_strict.outputs.should_fail || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Strict reason: ${{ steps.hybrid_superpass_gate_strict.outputs.reason || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "- Gate: skipped" >> $GITHUB_STEP_SUMMARY
        fi

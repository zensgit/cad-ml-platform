name: Stress and Observability Checks

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/stress_*.py'
      - 'scripts/ci/check_workflow_file_issues.py'
      - 'scripts/ci/check_workflow_publish_helper_adoption.py'
      - 'scripts/ci/generate_workflow_guardrail_summary.py'
      - 'scripts/ci/generate_workflow_inventory_report.py'
      - 'prometheus/rules/**'
      - 'grafana/dashboards/**'
      - '.github/workflows/*.yml'

jobs:
  workflow-file-health:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate workflow file health via GitHub parser
        run: |
          python3 scripts/ci/check_workflow_file_issues.py \
            --mode gh \
            --ref "${GITHUB_SHA}" \
            --summary-json-out reports/ci/workflow_file_health_summary.json
      - name: Generate workflow inventory audit report
        run: |
          python3 scripts/ci/generate_workflow_inventory_report.py \
            --workflow-root ".github/workflows" \
            --ci-watch-required-workflows "CI,CI Enhanced,CI Tiered Tests,Code Quality,Multi-Architecture Docker Build,Security Audit,Observability Checks,Self-Check,GHCR Publish,Evaluation Report,Governance Gates" \
            --output-json reports/ci/workflow_inventory_report.json \
            --output-md reports/ci/workflow_inventory_report.md \
            >/dev/null
      - name: Generate workflow publish helper adoption report
        run: |
          python3 scripts/ci/check_workflow_publish_helper_adoption.py \
            --workflow-root ".github/workflows" \
            --summary-json-out reports/ci/workflow_publish_helper_adoption.json \
            --output-md reports/ci/workflow_publish_helper_adoption.md \
            >/dev/null
      - name: Generate workflow guardrail summary report
        run: |
          python3 scripts/ci/generate_workflow_guardrail_summary.py \
            --workflow-file-health-json reports/ci/workflow_file_health_summary.json \
            --workflow-inventory-json reports/ci/workflow_inventory_report.json \
            --workflow-publish-helper-json reports/ci/workflow_publish_helper_adoption.json \
            --output-json reports/ci/workflow_guardrail_summary.json \
            --output-md reports/ci/workflow_guardrail_summary.md \
            >/dev/null
      - name: Upload workflow health summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: workflow-file-health-${{ github.run_number }}
          path: reports/ci/workflow_file_health_summary.json
      - name: Upload workflow inventory audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: workflow-inventory-report-${{ github.run_number }}
          path: |
            reports/ci/workflow_inventory_report.json
            reports/ci/workflow_inventory_report.md
      - name: Upload workflow publish helper adoption report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: workflow-publish-helper-adoption-${{ github.run_number }}
          path: |
            reports/ci/workflow_publish_helper_adoption.json
            reports/ci/workflow_publish_helper_adoption.md
      - name: Upload workflow guardrail summary report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: workflow-guardrail-summary-${{ github.run_number }}
          path: |
            reports/ci/workflow_guardrail_summary.json
            reports/ci/workflow_guardrail_summary.md
      - name: Append workflow inventory summary
        if: always()
        run: |
          if [[ -f reports/ci/workflow_inventory_report.md ]]; then
            cat reports/ci/workflow_inventory_report.md
          else
            echo "- workflow inventory markdown missing: reports/ci/workflow_inventory_report.md"
          fi >> "$GITHUB_STEP_SUMMARY"
      - name: Append workflow publish helper adoption summary
        if: always()
        run: |
          if [[ -f reports/ci/workflow_publish_helper_adoption.md ]]; then
            cat reports/ci/workflow_publish_helper_adoption.md
          else
            echo "- workflow publish helper markdown missing: reports/ci/workflow_publish_helper_adoption.md"
          fi >> "$GITHUB_STEP_SUMMARY"
      - name: Append workflow guardrail summary
        if: always()
        run: |
          if [[ -f reports/ci/workflow_guardrail_summary.md ]]; then
            cat reports/ci/workflow_guardrail_summary.md
          else
            echo "- workflow guardrail markdown missing: reports/ci/workflow_guardrail_summary.md"
          fi >> "$GITHUB_STEP_SUMMARY"

  metrics-consistency:
    needs: workflow-file-health
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
      - name: Verify metrics export presence
        run: make verify-metrics
      - name: Install promtool
        run: |
          curl -sL https://github.com/prometheus/prometheus/releases/download/v2.52.0/prometheus-2.52.0.linux-amd64.tar.gz | tar xz
          sudo mv prometheus-2.52.0.linux-amd64/promtool /usr/local/bin/promtool
      - name: Check Prometheus rules
        run: promtool check rules prometheus/rules/cad_ml_phase5_alerts.yaml
      - name: Lint Grafana dashboard JSON
        run: |
          python - <<'PY'
          import json,sys
          with open('grafana/dashboards/observability.json') as f:
            json.load(f)
          print('Grafana JSON OK')
          PY
      - name: Validate dashboard metrics export
        run: |
          python scripts/validate_dashboard_metrics.py

  stress-unit-tests:
    needs: workflow-file-health
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: http://127.0.0.1:8000
      API_KEY: test
      ADMIN_TOKEN: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-asyncio uvicorn httpx
      - name: Start API server
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE
          nohup uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
      - name: Wait for API readiness
        run: |
          for attempt in $(seq 1 20); do
            if curl -fsS ${API_BASE_URL}/health >/dev/null; then
              echo "API ready on attempt ${attempt}"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time" >&2
          exit 1
      - name: Health endpoint smoke check (Faiss)
        run: |
          for attempt in $(seq 1 10); do
            if curl -fsS ${API_BASE_URL}/api/v1/health/faiss/health -o faiss_health.json; then
              if python - <<'PY'
          import json
          with open('faiss_health.json') as f:
              data = json.load(f)
          required = ['degraded','degradation_history_count','next_recovery_eta','manual_recovery_in_progress']
          missing = [k for k in required if k not in data]
          if missing:
              raise SystemExit(f"Missing keys in Faiss health: {missing}")
          print('Faiss health keys present:', ', '.join(required))
          PY
              then
                break
              fi
            fi
            if [[ "${attempt}" == "10" ]]; then
              echo "Faiss health endpoint never returned valid JSON" >&2
              exit 1
            fi
            sleep 2
          done
      - name: Trigger manual recover and validate ETA reset
        env:
          ADMIN_TOKEN: ${{ env.ADMIN_TOKEN }}
        run: |
          curl -s -X POST ${API_BASE_URL}/api/v1/health/faiss/recover \
            -H "X-Admin-Token: ${ADMIN_TOKEN}" \
            -H "X-API-Key: ${API_KEY}" || true
          sleep 2
          for attempt in $(seq 1 10); do
            if curl -fsS ${API_BASE_URL}/api/v1/health/faiss/health -o faiss_health_after.json; then
              if python - <<'PY'
          import json
          with open('faiss_health_after.json') as f:
              data = json.load(f)
          eta = data.get('next_recovery_eta')
          available = data.get('available', False)
          # When Faiss is unavailable, eta can be None (acceptable in CI)
          # When available, eta should be 0 after manual recovery
          if not available:
              print(f'Faiss unavailable in CI environment, eta={eta} is acceptable')
          elif eta is None:
              raise SystemExit('next_recovery_eta missing after manual recover (Faiss available)')
          elif eta != 0:
              raise SystemExit(f'next_recovery_eta not reset to 0 after recover: {eta}')
          else:
              print('Manual recover validated: ETA reset to 0')
          PY
              then
                break
              fi
            fi
            if [[ "${attempt}" == "10" ]]; then
              echo "Faiss health after recover never returned valid JSON" >&2
              exit 1
            fi
            sleep 2
          done
      - name: Cache apply/rollback smoke check
        env:
          ADMIN_TOKEN: ${{ env.ADMIN_TOKEN }}
        run: |
          echo 'Applying cache settings...'
          curl -s -X POST ${API_BASE_URL}/api/v1/health/features/cache/apply \
            -H "X-Admin-Token: ${ADMIN_TOKEN}" -H "X-API-Key: ${API_KEY}" \
            -H 'Content-Type: application/json' \
            -d '{"capacity":256,"ttl_seconds":60}' | tee cache_apply.json
          python - <<'PY'
          import json,sys
          data=json.load(open('cache_apply.json'))
          snap=data.get('snapshot',{})
          if 'can_rollback_until' not in snap:
              sys.exit('Missing can_rollback_until in cache apply snapshot')
          print('Cache apply snapshot OK')
          PY
          echo 'Rolling back cache settings...'
          curl -s -X POST ${API_BASE_URL}/api/v1/health/features/cache/rollback \
            -H "X-Admin-Token: ${ADMIN_TOKEN}" -H "X-API-Key: ${API_KEY}" | tee cache_rollback.json
          python - <<'PY'
          import json,sys
          data=json.load(open('cache_rollback.json'))
          if data.get('status') not in ('rolled_back','no_active_window'):
              sys.exit(f'Unexpected rollback status: {data.get("status")}')
          print('Cache rollback status OK:', data.get('status'))
          PY
      - name: Run targeted tests
        run: |
          make test-targeted || true
          pytest -q tests/unit/test_migration_preview_stats.py::test_preview_stats_avg_median_and_warnings || true
          pytest -q tests/unit/test_faiss_flapping_suppression.py || true
      - name: Attach summary
        run: echo "Stress and observability checks completed" >> $GITHUB_STEP_SUMMARY

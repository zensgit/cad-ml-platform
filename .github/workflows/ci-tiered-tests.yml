name: CI Tiered Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-fast-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run core fast gate
        run: |
          set -o pipefail
          make validate-core-fast 2>&1 | tee /tmp/core-fast-gate-tiered.log

      - name: Upload core fast gate log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: core-fast-gate-tiered-log
          path: /tmp/core-fast-gate-tiered.log
          if-no-files-found: ignore

      - name: Append core fast gate summary
        if: always()
        run: |
          python scripts/ci/summarize_core_fast_gate.py \
            --log-file /tmp/core-fast-gate-tiered.log \
            --title "Core Fast Gate (Tiered CI)" \
            >> "$GITHUB_STEP_SUMMARY"

  # Anti-skip gate (owner-ratified, 2026-07-17): the inspector test previously
  # false-greened for months because `pytest.importorskip("torch")` silently
  # skipped it on every torch-less runner while its imports were broken
  # (33cb0f65 — see PR #523 diagnosis). This dedicated job runs on the
  # self-hosted lane (where torch is importable), PROVES torch imports, then
  # EXECUTES the inspector tests — a skip or missing torch here is a failure.
  # Deliberately a separate job: routing all of unit-tier to the self-hosted
  # lane unmasks unrelated environment-coupled debt (h5py-behind-torch-skips,
  # persistent-workspace checkpoint presence, mtime cache-key granularity) —
  # that migration belongs to the runner-routing PR (#523), not this gate.
  uvnet-inspector-gate:
    runs-on: ${{ vars.CADML_LINUX_RUNNER || 'ubuntu-latest' }}
    needs: [core-fast-gate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Assert torch importable (inspector test must execute, not skip)
        run: python -c "import torch; print('torch', torch.__version__)"

      - name: Run uvnet checkpoint inspector tests (skip-proof)
        run: python -m pytest tests/unit/test_uvnet_checkpoint_inspect.py -v -rs

  unit-tier:
    runs-on: ubuntu-latest
    needs: [core-fast-gate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run eval_with_history regression unit tests
        run: |
          pytest -q \
            tests/unit/test_graph2d_eval_helpers.py::test_eval_with_history_script_has_valid_bash_syntax \
            tests/unit/test_graph2d_eval_helpers.py::test_eval_with_history_writes_coarse_history_metrics \
            tests/unit/test_validate_eval_history_history_sequence.py

      - name: Run hybrid calibration regression unit tests
        run: |
          pytest -q \
            tests/unit/test_calibrate_hybrid_confidence_script.py \
            tests/unit/test_hybrid_confidence_calibration_gate_check.py

      - name: Run evaluation-integrity fail-closed gate unit tests (L3)
        run: |
          pytest -q \
            tests/unit/test_eval_integrity_gate.py \
            tests/unit/test_auto_retrain_failclosed.py

      - name: L3 activation-surface enumerator — no new unclassified model-load site (fail-closed)
        run: |
          python scripts/ci/activation_surface_enumerator.py
          pytest -q \
            tests/unit/test_activation_surface_enumerator.py \
            tests/unit/test_l3_phase_a_runtime_bleeding_control.py

      - name: Run unit tier
        run: bash scripts/test_with_local_api.sh --suite unit

  contract-local:
    runs-on: ubuntu-latest
    needs: [unit-tier]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run contract tier (local API)
        run: bash scripts/test_with_local_api.sh --suite contract --wait-seconds 90

      - name: Upload local API log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: contract-local-api-log
          path: /tmp/cad_ml_uvicorn.log
          if-no-files-found: ignore

  e2e-local:
    runs-on: ubuntu-latest
    needs: [contract-local]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Install Playwright browser
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run e2e tier (local API)
        run: bash scripts/test_with_local_api.sh --suite e2e --wait-seconds 120

      - name: Upload local API log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: e2e-local-api-log
          path: /tmp/cad_ml_uvicorn.log
          if-no-files-found: ignore

name: Release Risk Assessment

on:
  pull_request:
    branches:
      - main
      - master
      - production
      - release/*
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch for comparison'
        required: false
        default: 'main'

jobs:
  risk-assessment:
    name: Assess Release Risk
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整历史以进行比较

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests and collect results
        id: test
        continue-on-error: true
        run: |
          # 运行测试
          if [ -d tests ]; then
            python -m pytest tests/ \
              --junitxml=test-results.xml \
              --cov=src \
              --cov-report=xml \
              --cov-report=term \
              || true
          fi

          # 导出测试结果到环境变量
          if [ -f test-results.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' test-results.xml | grep -o '[0-9]*' | head -1)
            FAILED=$(grep -o 'failures="[0-9]*"' test-results.xml | grep -o '[0-9]*' | head -1)
            ERRORS=$(grep -o 'errors="[0-9]*"' test-results.xml | grep -o '[0-9]*' | head -1)
            SKIPPED=$(grep -o 'skipped="[0-9]*"' test-results.xml | grep -o '[0-9]*' | head -1)

            echo "TEST_TOTAL=${TOTAL:-0}" >> $GITHUB_ENV
            echo "TEST_FAILED=${FAILED:-0}" >> $GITHUB_ENV
            echo "TEST_ERRORS=${ERRORS:-0}" >> $GITHUB_ENV
            echo "TEST_SKIPPED=${SKIPPED:-0}" >> $GITHUB_ENV
            echo "TEST_PASSED=$((${TOTAL:-0} - ${FAILED:-0} - ${ERRORS:-0} - ${SKIPPED:-0}))" >> $GITHUB_ENV
          fi

      - name: Calculate Release Risk
        id: risk
        run: |
          # 确定基准分支
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_BRANCH="${{ github.base_ref }}"
          else
            BASE_BRANCH="${{ github.event.inputs.base_branch }}"
          fi

          echo "基准分支: $BASE_BRANCH"

          # 运行风险评分
          python scripts/release_risk_scorer.py \
            --base-branch "${BASE_BRANCH}" \
            --output-format json \
            --output-file risk_report.json

          # 提取关键信息
          RISK_SCORE=$(jq -r '.score' risk_report.json)
          RISK_LEVEL=$(jq -r '.level' risk_report.json)
          BLOCKING=$(jq -r '.blocking' risk_report.json)

          echo "risk_score=${RISK_SCORE}" >> $GITHUB_OUTPUT
          echo "risk_level=${RISK_LEVEL}" >> $GITHUB_OUTPUT
          echo "blocking=${BLOCKING}" >> $GITHUB_OUTPUT

          # 生成Markdown报告
          python scripts/release_risk_scorer.py \
            --base-branch "${BASE_BRANCH}" \
            --output-format markdown \
            --output-file risk_report.md

      - name: Comment PR with Risk Report
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // 读取报告
            const report = JSON.parse(fs.readFileSync('risk_report.json', 'utf8'));
            const markdown = fs.readFileSync('risk_report.md', 'utf8');

            // 选择合适的emoji和标签
            let emoji, label;
            if (report.level === 'LOW') {
              emoji = '✅';
              label = 'risk:low';
            } else if (report.level === 'MEDIUM') {
              emoji = '⚠️';
              label = 'risk:medium';
            } else if (report.level === 'HIGH') {
              emoji = '🟠';
              label = 'risk:high';
            } else {
              emoji = '🔴';
              label = 'risk:critical';
            }

            // 创建或更新评论
            const commentBody = `## ${emoji} Release Risk Assessment\n\n${markdown}`;

            // 查找现有的风险评估评论
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Release Risk Assessment')
            );

            try {
              if (botComment) {
                // 更新现有评论
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: commentBody
                });
              } else {
                // 创建新评论
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });
              }
            } catch (error) {
              console.log(`Failed to post PR comment: ${error.message}`);
            }

            // 添加或更新标签
            try {
              // 移除旧的风险标签
              const currentLabels = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });

              const riskLabels = currentLabels.data
                .filter(l => l.name.startsWith('risk:'))
                .map(l => l.name);

              if (riskLabels.length > 0) {
                for (const oldLabel of riskLabels) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: oldLabel
                  });
                }
              }

              // 添加新的风险标签
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label]
              });
            } catch (error) {
              console.log('无法添加标签（可能标签不存在）:', error.message);
            }

      - name: Upload Risk Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-assessment-report
          path: |
            risk_report.json
            risk_report.md
            test-results.xml
            coverage.xml

      - name: Check if should block
        if: steps.risk.outputs.blocking == 'true'
        run: |
          echo "⛔ 发布被阻断！风险评分过高: ${{ steps.risk.outputs.risk_score }}"
          echo ""
          echo "降低风险的建议:"
          echo "1. 增加测试覆盖率"
          echo "2. 减少单次变更量"
          echo "3. 修复失败的测试"
          echo "4. 考虑分批发布"
          echo ""
          echo "如需强制发布，请获得管理员批准。"
          exit 1

      - name: Post status check
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const score = '${{ steps.risk.outputs.risk_score }}';
            const level = '${{ steps.risk.outputs.risk_level }}';
            const blocking = '${{ steps.risk.outputs.blocking }}' === 'true';

            let state, description;
            if (level === 'LOW') {
              state = 'success';
              description = `低风险 (${score}/100) - 可以安全发布`;
            } else if (level === 'MEDIUM') {
              state = 'success';
              description = `中风险 (${score}/100) - 请注意监控`;
            } else if (level === 'HIGH' && !blocking) {
              state = 'warning';
              description = `高风险 (${score}/100) - 建议谨慎发布`;
            } else {
              state = 'failure';
              description = `极高风险 (${score}/100) - 发布已阻断`;
            }

            // 创建状态检查（在权限不足时仅记录警告）
            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: state,
                target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                description: description,
                context: 'Release Risk Assessment'
              });
            } catch (error) {
              console.log(`Failed to create commit status: ${error.message}`);
            }

      - name: Summary
        if: always()
        run: |
          echo "## 📊 风险评估摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **风险分数**: ${{ steps.risk.outputs.risk_score }}/100" >> $GITHUB_STEP_SUMMARY
          echo "- **风险等级**: ${{ steps.risk.outputs.risk_level }}" >> $GITHUB_STEP_SUMMARY
          echo "- **是否阻断**: ${{ steps.risk.outputs.blocking }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "详细报告已作为artifact上传，可以下载查看。" >> $GITHUB_STEP_SUMMARY

  # 可选：Slack通知
  slack-notification:
    name: Slack Notification
    needs: risk-assessment
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.risk-assessment.outputs.risk_level }}" == "CRITICAL" ]; then
            curl -X POST $SLACK_WEBHOOK_URL \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "🔴 高风险发布警告",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "⚠️ 高风险发布检测"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*PR*: <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}>\n*风险分数*: ${{ needs.risk-assessment.outputs.risk_score }}/100\n*风险等级*: ${{ needs.risk-assessment.outputs.risk_level }}"
                    }
                  }
                ]
              }'
          fi

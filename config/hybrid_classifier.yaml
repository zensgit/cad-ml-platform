enabled: true
version: "1.1.1"

filename:
  enabled: true
  min_confidence: 0.8
  exact_match_conf: 0.95
  partial_match_conf: 0.7
  fuzzy_match_conf: 0.5
  fusion_weight: 0.7
  synonyms_path: "data/knowledge/label_synonyms_template.json"

graph2d:
  enabled: true
  min_confidence: 0.5
  min_margin: 0.0
  fusion_weight: 0.3
  exclude_labels: "other"
  allow_labels: ""
  drawing_type_labels:
    - "零件图"
    - "机械制图"
    - "装配图"
    - "练习零件图"
    - "原理图"
    - "模板"

titleblock:
  enabled: true
  region_x_ratio: 0.6
  region_y_ratio: 0.4
  min_confidence: 0.75
  fusion_weight: 0.2
  override_enabled: false

process:
  enabled: true
  min_confidence: 0.3
  fusion_weight: 0.15

history_sequence:
  enabled: true
  shadow_only: false
  min_confidence: 0.55
  fusion_weight: 0.2
  prototypes_path: "data/knowledge/history_sequence_prototypes_template.json"
  model_path: ""
  prototype_token_weight: 1.0
  prototype_bigram_weight: 1.0

rejection:
  enabled: true
  min_confidence: 0.35

auto_enable:
  titleblock_on_text: true
  history_on_path: true

decision:
  advanced_fusion_enabled: true
  fusion_strategy: "weighted_average"
  auto_select_fusion: false
  explanation_enabled: true

sampling:
  max_nodes: 200
  strategy: "importance"
  seed: 42
  text_priority_ratio: 0.3

class_balance:
  strategy: "focal"
  weight_mode: "sqrt"
  focal_alpha: 0.25
  focal_gamma: 2.0
  logit_adj_tau: 1.0

multimodal:
  enabled: true
  geometry_weight: 0.3
  text_weight: 0.5
  rule_weight: 0.2
  gate_type: "weighted"

distillation:
  enabled: true
  alpha: 0.3
  temperature: 3.0
  teacher_type: "hybrid"
